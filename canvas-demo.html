<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentFlow — 画布交互 Demo v4</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d2e; --surface2: #232742;
    --border: #2a2e42; --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --accent: #3b82f6; --accent2: #7c3aed;
    --accent-glow: rgba(59,130,246,0.35);
    --green: #10b981; --green-bg: rgba(16,185,129,0.15);
    --orange: #f59e0b; --red: #ef4444;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); line-height:1.6; overflow:hidden; height:100vh; }
  .app { display:flex; flex-direction:column; height:100vh; }

  /* ═══ TOP BAR ═══ */
  .topbar { display:flex; align-items:center; gap:16px; padding:0 20px; height:52px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:100; }
  .topbar .logo { font-weight:700; font-size:18px; display:flex; align-items:center; gap:8px; }
  .topbar .logo .bolt { color:var(--accent); }
  .topbar .sep { width:1px; height:24px; background:var(--border); }
  .topbar .bread { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text3); }
  .topbar .bread .active { color:var(--text); font-weight:500; }
  .topbar-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
  .topbar-right .status { font-size:12px; color:var(--text3); display:flex; align-items:center; gap:6px; }
  .dot-green { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; }

  .btn { padding:6px 16px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:13px; cursor:pointer; transition:all 0.15s; font-family:var(--font); white-space:nowrap; }
  .btn:hover { border-color:var(--accent); color:#fff; }
  .btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:500; }
  .btn-primary:hover { background:#2563eb; box-shadow:0 0 20px var(--accent-glow); }
  .btn-success { background:var(--green); border-color:var(--green); color:#fff; }
  .btn-warn { background:var(--orange); border-color:var(--orange); color:#fff; }
  .btn-danger { background:var(--red); border-color:var(--red); color:#fff; }
  .btn-sm { padding:4px 10px; font-size:11px; }
  .btn-outline { background:transparent; border-color:var(--border); color:var(--text2); }
  .btn-outline:hover { border-color:var(--accent); color:#fff; }

  .body { display:flex; flex:1; overflow:hidden; }

  /* ═══ SIDEBAR ═══ */
  .sidebar { width:210px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
  .section-title { padding:12px 14px; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text3); border-bottom:1px solid var(--border); }
  .palette { flex:1; overflow-y:auto; padding:6px; }
  .palette-group { margin-bottom:12px; }
  .palette-group-title { font-size:10px; color:var(--text3); padding:6px 8px 2px; font-weight:600; letter-spacing:0.5px; }
  .palette-item { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:5px; cursor:grab; font-size:12px; color:var(--text2); transition:all 0.12s; }
  .palette-item:hover { background:var(--surface2); color:var(--text); }
  .palette-item .icon { width:24px; height:24px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .palette-item .icon.blue { background:rgba(59,130,246,0.13); }
  .palette-item .icon.green { background:rgba(16,185,129,0.13); }
  .palette-item .icon.purple { background:rgba(124,58,237,0.13); }
  .palette-item .icon.orange { background:rgba(245,158,11,0.13); }

  /* ═══ CANVAS ═══ */
  .canvas-wrap { flex:1; position:relative; overflow:hidden; background: radial-gradient(ellipse at 50% 40%, #131736 0%, #0a0c14 70%); }
  .canvas-grid { position:absolute; inset:0; background-image: linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px); background-size:40px 40px; pointer-events:none; }

  /* ═══ CANVAS SVG ═══ */
  .edges-svg { position:absolute; inset:0; z-index:2; pointer-events:none; overflow:visible; }
  .edges-svg path.edge-h { fill:none; stroke:var(--text3); stroke-width:2; stroke-dasharray:6,4; transition:stroke 0.4s,stroke-dasharray 0.4s; }
  .edges-svg path.edge-h.active { stroke:var(--accent); stroke-dasharray:none; }
  .edges-svg path.edge-h.done { stroke:var(--green); stroke-dasharray:none; stroke-width:2.5; }
  .edges-svg path.edge-v { fill:none; stroke:var(--text3); stroke-width:1.5; stroke-dasharray:4,4; transition:stroke 0.4s; }
  .edges-svg path.edge-v.done { stroke:var(--green); }
  .edges-svg .arrow { fill:var(--text3); transition:fill 0.4s; }
  .edges-svg .arrow.active { fill:var(--accent); }
  .edges-svg .arrow.done { fill:var(--green); }

  /* ═══ AGENT NODE ═══ */
  .canvas-layer { position:absolute; inset:0; z-index:5; }
  .agent-card {
    position:absolute; width:210px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:14px 16px;
    box-shadow:0 4px 16px rgba(0,0,0,0.3);
    cursor:pointer; transition:all 0.25s; z-index:5;
  }
  .agent-card:hover { border-color:var(--accent); box-shadow:0 4px 24px var(--accent-glow); transform:translateY(-1px); }
  .agent-card .hdr { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .agent-card .hdr .ic { font-size:16px; }
  .agent-card .hdr .t { font-size:12px; font-weight:600; }
  .agent-card .hdr .badge { font-size:9px; padding:1px 6px; border-radius:3px; background:rgba(59,130,246,0.12); color:var(--accent); font-weight:500; }
  .agent-card .hdr .sbadge { font-size:10px; padding:1px 8px; border-radius:3px; margin-left:auto; display:none; white-space:nowrap; }
  .agent-card .hdr .sbadge.run { display:none; background:rgba(59,130,246,0.12); color:var(--accent); }
  .agent-card .hdr .sbadge.ok { display:none; background:var(--green-bg); color:var(--green); }
  .agent-card .desc { font-size:11px; color:var(--text3); line-height:1.5; }
  .agent-card .click-hint { position:absolute; right:-4px; top:-4px; background:var(--accent); color:#fff; font-size:9px; padding:2px 6px; border-radius:8px; opacity:0; transition:opacity 0.3s; white-space:nowrap; font-weight:500; }
  .agent-card.show-hint .click-hint { opacity:1; }
  .agent-card.executing { border-color:var(--accent); box-shadow:0 0 30px var(--accent-glow); }
  .agent-card.executing .sbadge.run { display:inline-block; }
  .agent-card.done { border-color:var(--green); }
  .agent-card.done .sbadge.ok { display:inline-block; }
  .agent-card.done .click-hint { display:none !important; }

  /* ═══ OUTPUT CARD ═══ */
  .output-card {
    position:absolute; width:280px; min-height:56px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:10px 14px;
    box-shadow:0 3px 12px rgba(0,0,0,0.3);
    z-index:4; cursor:pointer;
    opacity:0; transform:translateX(-8px);
    transition:opacity 0.4s, transform 0.4s, border-color 0.3s;
  }
  .output-card.show { opacity:1; transform:translateX(0); }
  .output-card.done { border-color:var(--green); }
  .output-card:hover { border-color:var(--accent); }
  .output-card .oc-hdr { font-size:10px; color:var(--text3); font-weight:500; margin-bottom:4px; display:flex; align-items:center; gap:4px; }
  .output-card .oc-body { font-size:11px; color:var(--text2); font-family:var(--mono); line-height:1.5; }
  .output-card .oc-detail { font-size:10px; color:var(--accent); margin-top:2px; cursor:pointer; }
  .output-card .oc-detail:hover { text-decoration:underline; }
  .output-card .oc-status { float:right; font-size:10px; }
  .output-card .oc-status.running { color:var(--accent); }
  .output-card .oc-status.done { color:var(--green); }

  /* ═══ DEMO OVERLAY ═══ */
  .demo-overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; pointer-events:none; }
  .demo-overlay > * { pointer-events:auto; }

  .demo-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 36px; max-width:520px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.5); text-align:center; }
  .demo-card h2 { font-size:20px; margin-bottom:2px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .demo-card .sub { font-size:13px; color:var(--text2); margin-bottom:16px; }
  .demo-card textarea { width:100%; padding:12px 14px; border-radius:8px; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:13px; font-family:var(--font); resize:vertical; min-height:72px; outline:none; }
  .demo-card textarea:focus { border-color:var(--accent); }
  .demo-card .actions { margin-top:14px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }

  .agent-selector { margin:14px 0; text-align:left; }
  .agent-selector .as-title { font-size:12px; color:var(--text3); font-weight:500; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
  .agent-chip { display:inline-flex; align-items:center; gap:5px; padding:5px 10px; border-radius:6px; border:1px solid var(--border); font-size:11px; cursor:pointer; transition:all 0.15s; background:var(--bg); color:var(--text2); user-select:none; margin:2px; }
  .agent-chip:hover { border-color:var(--text3); }
  .agent-chip.active { border-color:var(--accent); background:rgba(59,130,246,0.1); color:var(--accent); }
  .agent-chip.disabled { opacity:0.35; border-color:var(--border); background:transparent; color:var(--text3); }

  .loading-bar { width:100%; height:3px; background:var(--border); border-radius:3px; overflow:hidden; margin:14px 0; }
  .loading-bar .fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:3px; width:0; transition:width 0.3s; }
  #genLog { font-size:12px; color:var(--text3); font-family:var(--mono); text-align:left; max-height:140px; overflow-y:auto; line-height:1.8; }

  .step-hint { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:35; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:6px 18px 6px 22px; display:flex; align-items:center; gap:10px; font-size:12px; color:var(--text2); box-shadow:0 4px 20px rgba(0,0,0,0.4); }
  .step-hint .dots { display:flex; gap:4px; }
  .step-hint .dots .dot { width:6px; height:6px; border-radius:50%; background:var(--text3); transition:all 0.3s; }
  .step-hint .dots .dot.active { background:var(--accent); box-shadow:0 0 8px var(--accent-glow); }
  .step-hint .dots .dot.done { background:var(--green); }

  /* ═══ PANEL ═══ */
  .panel { width:330px; background:var(--surface); border-left:1px solid var(--border); flex-shrink:0; display:flex; flex-direction:column; }
  .panel-header { padding:12px 14px; border-bottom:1px solid var(--border); font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; }
  .panel-body { flex:1; overflow-y:auto; padding:14px; }
  .panel-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; text-align:center; color:var(--text3); font-size:13px; gap:12px; }
  .panel-placeholder .big-icon { font-size:40px; opacity:0.5; }

  .config-row { margin-bottom:12px; }
  .config-row label { display:block; font-size:11px; color:var(--text3); margin-bottom:2px; font-weight:500; }
  .config-row input,.config-row select { width:100%; padding:7px 10px; border-radius:5px; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:12px; outline:none; }
  .config-row input:focus { border-color:var(--accent); }
  .config-row input[readonly] { color:var(--text2); cursor:default; }
  .schema-box { background:var(--bg); border-radius:5px; padding:10px 12px; font-family:var(--mono); font-size:10px; color:var(--text2); line-height:1.6; border:1px solid var(--border); white-space:pre; overflow-x:auto; }
  .node-type-indicator { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--bg); border-radius:8px; margin-bottom:14px; border:1px solid var(--border); }
  .node-type-indicator .nt-icon { font-size:20px; }
  .node-type-indicator .nt-name { font-size:13px; font-weight:600; }
  .node-type-indicator .nt-desc { font-size:11px; color:var(--text3); }
  .section-hr { border:none; border-top:1px solid var(--border); margin:14px 0; }

  .exec-log { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:10px 12px; font-family:var(--mono); font-size:11px; line-height:1.7; max-height:240px; overflow-y:auto; }
  .exec-log .line { display:flex; gap:8px; }
  .exec-log .ts { color:var(--text3); flex-shrink:0; }
  .exec-log .ok { color:var(--green); }
  .exec-log .info { color:var(--accent); }
  .exec-log .warn { color:var(--orange); }

  .result-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.55); z-index:50; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
  .result-modal { width:520px; max-height:85vh; overflow-y:auto; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px; box-shadow:0 24px 80px rgba(0,0,0,0.6); }
  .result-modal h2 { font-size:18px; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
  .result-modal .sub { color:var(--text2); font-size:13px; margin-bottom:16px; }
  .result-item { padding:10px 12px; background:var(--bg); border-radius:6px; margin-bottom:8px; border:1px solid var(--border); display:flex; align-items:center; gap:10px; cursor:pointer; }
  .result-item:hover { border-color:var(--accent); }
  .result-item .ri-icon { width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .result-item .ri-info { flex:1; }
  .result-item .ri-title { font-size:12px; font-weight:500; }
  .result-item .ri-detail { font-size:11px; color:var(--text3); }
  .result-data { background:var(--bg); border-radius:6px; padding:10px; font-family:var(--mono); font-size:11px; color:var(--text2); border:1px solid var(--border); white-space:pre; overflow-x:auto; margin-top:10px; line-height:1.5; }

  .hidden { display:none !important; }
  .fade-in { animation:fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .slide-up { animation:slideUp 0.4s ease forwards; }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  @media (max-width:900px) { .sidebar { display:none; } .panel { width:280px; } }
</style>
</head>
<body>
<div class="app">
  <!-- ═══ TOP BAR ═══ -->
  <div class="topbar">
    <div class="logo"><span class="bolt">⚡</span> AgentFlow</div>
    <div class="sep"></div>
    <div class="bread"><span class="active">画布</span><span style="color:var(--text3)">/</span><span style="color:var(--text3)">PID控制器设计工作流</span></div>
    <div class="topbar-right">
      <span class="status"><span class="dot-green"></span> <span id="agentCount">4</span> Agent 就绪</span>
      <button class="btn btn-sm" onclick="resetDemo()">🔄 重置</button>
    </div>
  </div>

  <div class="body">
    <!-- ═══ SIDEBAR ═══ -->
    <div class="sidebar">
      <div class="section-title">📦 节点面板</div>
      <div class="palette">
        <div class="palette-group">
          <div class="palette-group-title">🤖 AI Agent</div>
          <div class="palette-item"><span class="icon blue">🧮</span> 算法设计</div>
          <div class="palette-item"><span class="icon green">💻</span> 软件开发</div>
          <div class="palette-item"><span class="icon purple">🧪</span> 编译测试</div>
          <div class="palette-item"><span class="icon orange">📝</span> 文档生成</div>
        </div>
        <div class="palette-group">
          <div class="palette-group-title">🔧 工具</div>
          <div class="palette-item"><span class="icon orange">🔍</span> 搜索</div>
          <div class="palette-item"><span class="icon orange">📎</span> 文件读取</div>
          <div class="palette-item"><span class="icon blue">🌐</span> API 调用</div>
        </div>
      </div>
    </div>

    <!-- ═══ CANVAS ═══ -->
    <div class="canvas-wrap" id="canvasWrap">
      <div class="canvas-grid"></div>
      <svg class="edges-svg" id="edgesSvg"></svg>
      <div class="canvas-layer" id="agentLayer"></div>
      <div class="canvas-layer" id="outputLayer"></div>

      <div class="demo-overlay" id="demoOverlay">
        <!-- Step 0: Welcome -->
        <div class="demo-card" id="stepWelcome">
          <h2>👋 欢迎使用 AgentFlow</h2>
          <p class="sub">输入需求，选择 Agent，AI 自动生成工作流</p>
          <textarea id="reqInput">为四旋翼无人机设计PID控制器并生成C++代码，然后编译测试</textarea>

          <div class="agent-selector">
            <div class="as-title">🤖 Agent 配置</div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
              <div style="font-size:12px;color:var(--text2);">数量</div>
              <div style="display:flex;align-items:center;gap:4px;">
                <button class="btn btn-sm" style="width:28px;height:28px;padding:0;font-size:16px;line-height:1;" onclick="adjustAgentCount(-1)">−</button>
                <span id="asCount" style="font-size:18px;font-weight:700;color:var(--accent);width:28px;text-align:center;">4</span>
                <button class="btn btn-sm" style="width:28px;height:28px;padding:0;font-size:16px;line-height:1;" onclick="adjustAgentCount(1)">+</button>
              </div>
              <div style="font-size:11px;color:var(--text3);">可点选具体 Agent</div>
            </div>
            <div id="agentChips">
              <span class="agent-chip active" data-id="alg">🧮 算法设计</span>
              <span class="agent-chip active" data-id="dev">💻 软件开发</span>
              <span class="agent-chip active" data-id="test">🧪 编译测试</span>
              <span class="agent-chip active" data-id="doc">📝 文档生成</span>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-outline btn-sm" onclick="fillExample()">📋 示例</button>
            <button class="btn btn-primary" onclick="startGenerate()">🚀 AI 生成工作流</button>
          </div>
        </div>

        <!-- Step 1: Generating -->
        <div class="demo-card hidden" id="stepGenerating">
          <h2>🤖 AI 正在分析需求...</h2>
          <p class="sub">意图解析 → 任务分解 → 节点匹配 → DAG 生成</p>
          <div class="loading-bar"><div class="fill" id="loadingFill"></div></div>
          <div id="genLog"></div>
        </div>

        <!-- Step hint -->
        <div class="step-hint hidden" id="stepHint">
          <span id="stepHintText">步骤 0/4</span>
          <div class="dots">
            <span class="dot done" data-s="0"></span>
            <span class="dot" data-s="1"></span>
            <span class="dot" data-s="2"></span>
            <span class="dot" data-s="3"></span>
          </div>
          <button class="btn btn-sm" id="stepNextBtn">下一步 →</button>
        </div>
      </div>
    </div>

    <!-- ═══ PANEL ═══ -->
    <div class="panel" id="rightPanel">
      <div class="panel-header" id="panelTitle">📋 节点配置</div>
      <div class="panel-body" id="panelBody">
        <div class="panel-placeholder"><div class="big-icon">🔗</div><div>点击画布上的节点<br>查看详细配置</div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════

const AGENT_ORDER = ['alg','dev','test','doc'];
const AGENT_META = {
  alg: { icon:'🧮', label:'算法设计', type:'algorithm-designer', desc:'Ziegler-Nichols → PID 参数', color:'blue' },
  dev: { icon:'💻', label:'C++ 代码实现', type:'software-dev', desc:'ArduPilot → PID 控制器', color:'green' },
  test:{ icon:'🧪', label:'编译与测试', type:'compile-test', desc:'scons 编译 + 单元测试', color:'purple' },
  doc: { icon:'📝', label:'输出报告', type:'document-gen', desc:'综合结果 → PDF 文档', color:'orange' },
};
const AGENT_RESULTS = {
  alg: { summary:'Kp=2.5, Ki=1.0, Kd=0.3', detail:JSON.stringify({Kp:2.5,Ki:1.0,Kd:0.3,method:'Ziegler-Nichols',iterations:4},null,2) },
  dev: { summary:'PID.cpp + PID.h (136行)', detail:JSON.stringify({files:['PID.cpp','PID.h'],lines:136,framework:'ArduPilot-RTT'},null,2) },

const EXEC_LOG = [

  {ts:'00:02',msg:'启动 Agent 容器 (algorithm-designer)',type:'info'},

  {ts:'00:10',msg:'启动 Agent 容器 (software-dev)',type:'info'},
  {ts:'00:15',msg:'✓ PID 控制器 C++ 代码生成完成 (136行)',type:'ok'},
  {ts:'00:18',msg:'启动 Agent 容器 (compile-test)',type:'info'},
  {ts:'00:22',msg:'✓ scons --board=cuav-v5 编译通过',type:'ok'},

];

const PROMPT_TEMPLATES = {

目标：设计四旋翼无人机PID控制器。

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════

let step = 0, genTimer = null, execTimer = null;
let activeAgents = ['alg','dev','test','doc'];

// ═══ LAYOUT CONSTANTS ═══
const AGENT_X = 60;
const OUTPUT_X = 340;
const CARD_W = 210;
const ROW_GAP = 110;
const ROW_START = 60;

function layoutY(idx) { return ROW_START + idx * ROW_GAP; }

function getSortedIds() { return AGENT_ORDER.filter(id => activeAgents.includes(id)); }

// ═══════════════════════════════════════════════
// AGENT SELECTOR
// ═══════════════════════════════════════════════

function updateCountUI() {
  document.getElementById('asCount').textContent = activeAgents.length;
  document.getElementById('agentCount').textContent = activeAgents.length;
}

function adjustAgentCount(delta) {
  const allIds = AGENT_ORDER;
  const n = activeAgents.length + delta;
  if (n < 1 || n > allIds.length) return;
  const chips = document.querySelectorAll('.agent-chip');
  if (delta > 0) {
    const toAdd = allIds.find(id => !activeAgents.includes(id));
    if (!toAdd) return;
    activeAgents.push(toAdd);
    activeAgents.sort((a,b) => allIds.indexOf(a)-allIds.indexOf(b));
    chips.forEach(c => { if (c.dataset.id===toAdd) { c.classList.add('active');c.classList.remove('disabled'); } });
  } else {
    const toRemove = activeAgents[activeAgents.length-1];
    activeAgents = activeAgents.filter(id => id !== toRemove);
    chips.forEach(c => { if (c.dataset.id===toRemove) { c.classList.remove('active');c.classList.add('disabled'); } });
  }
  updateCountUI();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('agentChips').addEventListener('click', e => {
    const chip = e.target.closest('.agent-chip');
    if (!chip) return;
    const id = chip.dataset.id;
    if (activeAgents.includes(id)) {
      if (activeAgents.length <= 1) return;
      activeAgents = activeAgents.filter(x => x !== id);
      chip.classList.remove('active'); chip.classList.add('disabled');
    } else {
      activeAgents.push(id);
      activeAgents.sort((a,b) => AGENT_ORDER.indexOf(a)-AGENT_ORDER.indexOf(b));
      chip.classList.remove('disabled'); chip.classList.add('active');
    }
    updateCountUI();
  });
});

function fillExample() {
  document.getElementById('reqInput').value =
    '为四旋翼无人机设计PID控制器 → Ziegler-Nichols方法整定；\n生成C++实现代码（ArduPilot框架）；\n编译测试通过 → 输出报告';
}

// ═══════════════════════════════════════════════
// STEP 1 → 2: GENERATE
// ═══════════════════════════════════════════════

function startGenerate() {
  const val = document.getElementById('reqInput').value.trim();
  if (!val) { document.getElementById('reqInput').focus(); return; }
  hide('stepWelcome'); show('stepGenerating'); show('stepHint');
  step = 1; updateStepUI();

  const log = document.getElementById('genLog'); log.innerHTML = '';
  document.getElementById('loadingFill').style.width = '0%';
  const ids = getSortedIds();
  const msgs = [
    [8,'📡 解析用户需求语义...'],
    [20,'🔍 意图识别: '+ids.length+' 个 Agent'],
    [33,'🔗 匹配节点: '+ids.join(', ')],
    [48,'🧩 拓扑排序: '+ids.map(id=>AGENT_META[id].label).join(' → ')],
    [62,'📦 渲染节点模板 (YAML → PromptTask)'],
    [78,'🔌 连接数据流'],
    [90,'✅ 工作流 DAG 构建完毕'],
    [100,'🎯 即将打开可视化画布...'],
  ];
  let i = 0;
  genTimer = setInterval(() => {
    if (i >= msgs.length) { clearInterval(genTimer); genTimer=null; setTimeout(showCanvas,350); return; }
    document.getElementById('loadingFill').style.width = msgs[i][0]+'%';
    log.innerHTML += '<div>'+msgs[i][1]+'</div>'; log.scrollTop = log.scrollHeight; i++;
  }, 500);
}

// ═══════════════════════════════════════════════
// STEP 2: CANVAS — Vertical Aligned Layout
// ═══════════════════════════════════════════════

function showCanvas() {
  hide('stepGenerating'); step = 2; updateStepUI();
  renderAgents(); renderEmptyOutputs(); drawEdges();
}

function renderAgents() {
  const layer = document.getElementById('agentLayer'); layer.innerHTML = '';
  const ids = getSortedIds();
  ids.forEach((id, i) => {
    const m = AGENT_META[id];
    const el = document.createElement('div');
    el.className = 'agent-card fade-in';
    el.id = 'n-'+id;
    el.style.left = AGENT_X + 'px'; el.style.top = layoutY(i) + 'px';
    el.onclick = () => showConfig(id);
    el.innerHTML =
      '<div class="hdr"><span class="ic">'+m.icon+'</span><span class="t">'+m.label+'</span><span class="badge">'+m.type+'</span>'+
      '<span class="sbadge run">▶ 运行中</span><span class="sbadge ok">✓ 完成</span>'+
      '<span class="click-hint">👆 点击配置</span></div>'+
      '<div class="desc">'+m.desc+'</div>';
    layer.appendChild(el);
  });
  setTimeout(() => {
    const first = document.querySelector('.agent-card');
    if (first) first.classList.add('show-hint');
  }, 1000);
}

function renderEmptyOutputs() {
  document.getElementById('outputLayer').innerHTML = '';
  const ids = getSortedIds();
  ids.forEach((id, i) => {
    const card = document.createElement('div');
    card.className = 'output-card';
    card.id = 'oc-'+id;
    card.style.left = OUTPUT_X + 'px'; card.style.top = layoutY(i) + 'px';
    card.onclick = () => showConfig(id);
    card.innerHTML =
      '<div class="oc-hdr"><span>📤 输出</span><span class="oc-status">⏳ 等待执行</span></div>'+
      '<div class="oc-body" style="color:var(--text3);">—</div>';
    document.getElementById('outputLayer').appendChild(card);
    // Show with animation after the agent card appears
    setTimeout(() => card.classList.add('show'), 200 + i*100);
  });
}

function drawEdges() {
  const svg = document.getElementById('edgesSvg'); svg.innerHTML = '';
  const ids = getSortedIds();

  ids.forEach((id, i) => {
    const agentCard = document.getElementById('n-'+id);
    if (!agentCard) return;
    const y = layoutY(i) + 27; // center of card height (~54px)
    const x1 = AGENT_X + CARD_W;
    const x2 = OUTPUT_X;

    // Horizontal line: agent → output (right edge of agent to left of output)
    const h = document.createElementNS('http://www.w3.org/2000/svg','path');
    h.setAttribute('d', `M ${x1} ${y} L ${x2} ${y}`);
    h.setAttribute('class','edge-h');
    h.id = 'eh-'+id;

    // Arrow point
    const arr = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    arr.setAttribute('points', `${x2},${y} ${x2-7},${y-4} ${x2-7},${y+4}`);
    arr.setAttribute('class','arrow');
    arr.id = 'ea-'+id;

    svg.appendChild(h); svg.appendChild(arr);

    // Vertical line: down to next agent (except last)
    if (i < ids.length - 1) {
      const y1 = layoutY(i) + 27;
      const y2 = layoutY(i+1) + 27;
      const v = document.createElementNS('http://www.w3.org/2000/svg','path');
      v.setAttribute('d', `M ${x2 + 10} ${y1} L ${x2 + 10} ${y2}`);
      v.setAttribute('class','edge-v');
      v.id = 'ev-'+id;
      svg.appendChild(v);
    }
  });
}

// ═══════════════════════════════════════════════
// STEP 3: EXECUTION
// ═══════════════════════════════════════════════

function startExecution() {
  step = 3; updateStepUI();
  document.getElementById('panelTitle').textContent = '💻 执行日志';
  document.getElementById('panelBody').innerHTML =
    '<div class="exec-log" id="execLog"></div>'+
    '<div style="margin-top:10px;"><button class="btn btn-sm btn-outline" style="width:100%;" onclick="showAllResults()">📊 查看所有结果</button></div>';

  const log = document.getElementById('execLog');
  let i = 0;
  execTimer = setInterval(() => {
    if (i >= EXEC_LOG.length) {
      clearInterval(execTimer); execTimer=null;
      document.getElementById('panelTitle').textContent = '✅ 执行完成';
      return;
    }
    const l = EXEC_LOG[i]; const ids = getSortedIds();
    log.innerHTML += '<div class="line"><span class="ts">['+l.ts+']</span><span class="'+l.type+'">'+l.msg+'</span></div>';
    log.scrollTop = log.scrollHeight;

    if (l.msg.includes('algorithm-designer')) { setStatus('alg','executing'); setOutputStatus('alg','running','计算中...'); }
    else if (l.msg.includes('software-dev')) { setStatus('alg','done'); fillOutput('alg'); setStatus('dev','executing'); setOutputStatus('dev','running','代码生成中...'); updateEdge('alg','done'); }
    else if (l.msg.includes('compile-test')) { setStatus('dev','done'); fillOutput('dev'); setStatus('test','executing'); setOutputStatus('test','running','编译中...'); updateEdge('dev','done'); }
    else if (l.msg.includes('document-gen')) { setStatus('test','done'); fillOutput('test'); setStatus('doc','executing'); setOutputStatus('doc','running','生成报告中...'); updateEdge('test','done'); }
    else if (l.msg.includes('工作流执行完毕')) { setStatus('doc','done'); fillOutput('doc'); updateEdge('doc','done'); }
    i++;
  }, 1300);
}

function setStatus(id, status) {
  const el = document.getElementById('n-'+id);
  if (el) { el.classList.remove('executing','done','failed'); if (status) el.classList.add(status); }
}

function setOutputStatus(id, status, text) {
  const oc = document.getElementById('oc-'+id);
  if (!oc) return;
  oc.querySelector('.oc-status').textContent = status==='running'?'▶ 运行中':'⏳ 等待';
  oc.querySelector('.oc-status').className = 'oc-status ' + status;
  oc.querySelector('.oc-body').textContent = text || '—';
}

function fillOutput(id) {
  const r = AGENT_RESULTS[id]; if (!r) return;
  const oc = document.getElementById('oc-'+id);
  if (!oc) return;
  oc.classList.add('done');
  oc.querySelector('.oc-status').textContent = '✓ 完成';
  oc.querySelector('.oc-status').className = 'oc-status done';
  oc.querySelector('.oc-body').textContent = r.summary;
  // Add expand link
  const existing = oc.querySelector('.oc-detail');
  if (!existing) {
    const link = document.createElement('div');
    link.className = 'oc-detail';
    link.textContent = '展开查看 →';
    link.onclick = (e) => { e.stopPropagation(); showResultDetail(id); };
    oc.querySelector('.oc-body').after(link);
  }
}

function updateEdge(id, status) {
  const h = document.getElementById('eh-'+id);
  const a = document.getElementById('ea-'+id);
  if (h) { h.classList.remove('active','done'); h.classList.add(status); }
  if (a) { a.classList.remove('active','done'); a.classList.add(status); }
  const v = document.getElementById('ev-'+id);
  if (v && status==='done') v.classList.add('done');
}

// ═══════════════════════════════════════════════
// CONFIG / DETAIL
// ═══════════════════════════════════════════════

function showConfig(id) {
  const m = AGENT_META[id]; const meta = NODE_META[m.type]||{};
  document.getElementById('panelTitle').textContent = '⚙️ '+m.label;

  const schemaMap = {
    alg: JSON.stringify({Kp:'number',Ki:'number',Kd:'number'},null,2),
    dev: JSON.stringify({source_code:'string',header:'string',lines:'number'},null,2),
    test:JSON.stringify({build:'pass|fail',tests_passed:'number',tests_total:'number'},null,2),
    doc: JSON.stringify({report_url:'string',format:'PDF',pages:'number'},null,2),
  };
  const inputMap = { alg:'无 (根节点)', dev:'$ref:alg/output', test:'$ref:dev/output', doc:'$ref:test/output' };

  document.getElementById('panelBody').innerHTML =
    '<div class="node-type-indicator"><span class="nt-icon">'+m.icon+'</span><div><div class="nt-name">'+meta.name+'</div><div class="nt-desc">'+meta.desc+'</div></div></div>'+
    '<div class="config-row"><label>节点类型</label><input value="'+m.type+'" readonly></div>'+
    '<div class="config-row"><label>标签</label><input value="'+m.label+'"></div>'+
    '<hr class="section-hr">'+
    '<div style="font-size:11px;color:var(--text3);margin-bottom:6px;">📝 Agent 提示词</div>'+
    '<div class="schema-box" style="white-space:pre-wrap;font-size:10px;line-height:1.6;">'+(PROMPT_TEMPLATES[id]||'—')+'</div>'+
    '<hr class="section-hr">'+
    '<div style="display:flex;gap:10px;">'+
      '<div class="config-row" style="flex:1;"><label>超时(秒)</label><input value="'+(id==='dev'?300:120)+'"></div>'+
      '<div class="config-row" style="flex:1;"><label>重试</label><input value="'+(id==='test'?0:2)+'"></div>'+
    '</div>';
}

function showResultDetail(id) {
  const r = AGENT_RESULTS[id]; const m = AGENT_META[id];
  if (!r) return;
  document.getElementById('panelTitle').textContent = '📊 '+m.label+' — 输出';
  document.getElementById('panelBody').innerHTML =
    '<div class="node-type-indicator"><span class="nt-icon">'+m.icon+'</span><div><div class="nt-name">'+m.label+'</div><div class="nt-desc" style="color:var(--green)">✓ 执行完成</div></div></div>'+
    '<div class="config-row"><label>输出摘要</label><div class="schema-box" style="font-size:12px;white-space:normal;">'+r.summary+'</div></div>'+
    '<hr class="section-hr">'+
    '<div style="font-size:11px;color:var(--text3);margin-bottom:6px;">📄 完整输出</div>'+
    '<div class="schema-box">'+r.detail+'</div>'+
    '<hr class="section-hr">'+
    '<div style="font-size:11px;color:var(--text3);margin-bottom:6px;">📍 执行信息</div>'+
    '<div class="schema-box" style="font-size:11px;white-space:normal;">容器: agent-'+id+'\n耗时: '+(id==='alg'?8:id==='dev'?12:id==='test'?10:6)+'s\nTokens: '+(id==='alg'?1024:id==='dev'?1536:id==='test'?896:759)+'</div>';
}

// ═══════════════════════════════════════════════
// SHOW ALL RESULTS
// ═══════════════════════════════════════════════

function showAllResults() {
  const ov = document.createElement('div'); ov.className='result-overlay fade-in'; ov.id='resultOverlay';
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  let items = '';
  getSortedIds().forEach(id => {
    const m = AGENT_META[id]; const r = AGENT_RESULTS[id];
    if (!r) return;
    const bg = {alg:'rgba(59,130,246,0.12)',dev:'rgba(16,185,129,0.12)',test:'rgba(124,58,237,0.12)',doc:'rgba(245,158,11,0.12)'};
    items += '<div class="result-item" onclick="showResultDetail(\''+id+'\');this.closest(\'.result-overlay\').remove();">'+
      '<div class="ri-icon" style="background:'+bg[id]+'">'+m.icon+'</div>'+
      '<div class="ri-info"><div class="ri-title">'+m.label+'</div><div class="ri-detail">'+r.summary+'</div></div>'+
      '<span style="color:var(--green);font-weight:600;">✓</span></div>';
  });
  const ids = getSortedIds();
  ov.innerHTML = '<div class="result-modal slide-up"><h2>✅ 工作流执行完成</h2><div class="sub">'+ids.length+' 个 Agent · 32 秒 · 4,215 tokens</div>'+items+
    '<div class="result-data">{"status":"completed","agents":'+JSON.stringify(ids)+',"total_time_s":32,"total_tokens":4215}</div>'+
    '<div style="margin-top:16px;display:flex;gap:10px;justify-content:center;">'+
    '<button class="btn btn-sm" onclick="this.closest(\'.result-overlay\').remove()">关闭</button>'+
    '<button class="btn btn-sm btn-success" onclick="this.closest(\'.result-overlay\').remove()">📄 导出报告</button></div></div>';
  document.getElementById('canvasWrap').appendChild(ov); updateStepUI();
}

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════

function $(id){return document.getElementById(id);}
function show(id){$(id).classList.remove('hidden');}
function hide(id){$(id).classList.add('hidden');}

function updateStepUI() {
  document.querySelectorAll('.step-hint .dots .dot').forEach((d,i)=>{
    d.classList.toggle('done',i<step); d.classList.toggle('active',i===step);
  });
  const btn=document.getElementById('stepNextBtn');
  if (step>=3) {
    document.getElementById('stepHintText').textContent='✅ 全部完成';
    btn.textContent='🔄 重新演示'; btn.onclick=resetDemo;
  } else if (step===0) {
    document.getElementById('stepHintText').textContent='步骤 1/4：输入需求';
    btn.textContent='⏭ 跳过 → AI 生成'; btn.onclick=startGenerate;
  } else if (step===1) {
    document.getElementById('stepHintText').textContent='步骤 2/4：AI 生成中';
    btn.textContent='⏭ 跳过 → 画布';
    btn.onclick=function(){if(genTimer){clearInterval(genTimer);genTimer=null;}showCanvas();};
  } else if (step===2) {
    document.getElementById('stepHintText').textContent='步骤 3/4：查看画布';
    btn.textContent='▶ 运行工作流'; btn.onclick=startExecution;
  }
}

function resetDemo() {
  if(genTimer){clearInterval(genTimer);genTimer=null;}
  if(execTimer){clearInterval(execTimer);execTimer=null;}
  step=0;
  const ov=document.getElementById('resultOverlay'); if(ov)ov.remove();
  document.getElementById('agentLayer').innerHTML='';
  document.getElementById('outputLayer').innerHTML='';
  document.getElementById('edgesSvg').innerHTML='';
  document.getElementById('panelTitle').textContent='📋 节点配置';
  document.getElementById('panelBody').innerHTML='<div class="panel-placeholder"><div class="big-icon">🔗</div><div>点击画布上的节点<br>查看详细配置</div></div>';
  show('stepWelcome');hide('stepGenerating');hide('stepHint');
  document.getElementById('genLog').innerHTML='';
  document.getElementById('loadingFill').style.width='0%';
  activeAgents=['alg','dev','test','doc'];
  document.querySelectorAll('.agent-chip').forEach(c=>{c.classList.toggle('active',activeAgents.includes(c.dataset.id));c.classList.remove('disabled');});
  document.getElementById('asCount').textContent='4';
  document.getElementById('agentCount').textContent='4';
  updateCountUI();
}
