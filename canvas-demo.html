<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentFlow — 画布交互 Demo v2</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d2e; --surface2: #232742;
    --border: #2a2e42; --border-hl: #3b5b8a;
    --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --accent: #3b82f6; --accent2: #7c3aed;
    --accent-glow: rgba(59,130,246,0.35);
    --green: #10b981; --green-bg: rgba(16,185,129,0.15);
    --orange: #f59e0b; --red: #ef4444;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font); line-height:1.6;
    overflow: hidden; height: 100vh;
  }

  .app { display:flex; flex-direction:column; height:100vh; }

  /* ═══ TOP BAR ═══ */
  .topbar {
    display:flex; align-items:center; gap:16px;
    padding:0 20px; height:52px;
    background: var(--surface); border-bottom:1px solid var(--border);
    flex-shrink:0; z-index:100;
  }
  .topbar .logo { font-weight:700; font-size:18px; display:flex; align-items:center; gap:8px; }
  .topbar .logo .bolt { color:var(--accent); }
  .topbar .sep { width:1px; height:24px; background:var(--border); }
  .topbar .bread { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text3); }
  .topbar .bread .active { color:var(--text); font-weight:500; }
  .topbar-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
  .topbar-right .status { font-size:12px; color:var(--text3); display:flex; align-items:center; gap:6px; }
  .dot-green { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; }

  .btn {
    padding:6px 16px; border-radius:6px; border:1px solid var(--border);
    background:var(--surface2); color:var(--text); font-size:13px;
    cursor:pointer; transition:all 0.15s; font-family:var(--font); white-space:nowrap;
  }
  .btn:hover { border-color:var(--accent); color:#fff; }
  .btn-primary {
    background:var(--accent); border-color:var(--accent); color:#fff; font-weight:500;
  }
  .btn-primary:hover { background:#2563eb; box-shadow:0 0 20px var(--accent-glow); }
  .btn-success { background:var(--green); border-color:var(--green); color:#fff; }
  .btn-danger { background:var(--red); border-color:var(--red); color:#fff; }
  .btn-sm { padding:4px 10px; font-size:11px; }

  .body { display:flex; flex:1; overflow:hidden; }

  /* ═══ SIDEBAR ═══ */
  .sidebar {
    width:210px; background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; flex-shrink:0;
  }
  .section-title {
    padding:12px 14px; font-size:10px; text-transform:uppercase;
    letter-spacing:1px; color:var(--text3); border-bottom:1px solid var(--border);
  }
  .palette { flex:1; overflow-y:auto; padding:6px; }
  .palette-group { margin-bottom:12px; }
  .palette-group-title { font-size:10px; color:var(--text3); padding:6px 8px 2px; font-weight:600; letter-spacing:0.5px; }
  .palette-item {
    display:flex; align-items:center; gap:8px;
    padding:6px 8px; border-radius:5px; cursor:grab;
    font-size:12px; color:var(--text2); transition:all 0.12s;
  }
  .palette-item:hover { background:var(--surface2); color:var(--text); }
  .palette-item .icon { width:24px; height:24px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .palette-item .icon.blue { background:rgba(59,130,246,0.13); }
  .palette-item .icon.green { background:rgba(16,185,129,0.13); }
  .palette-item .icon.purple { background:rgba(124,58,237,0.13); }
  .palette-item .icon.orange { background:rgba(245,158,11,0.13); }

  /* ═══ CANVAS ═══ */
  .canvas-wrap {
    flex:1; position:relative; overflow:hidden;
    background: radial-gradient(ellipse at 50% 40%, #131736 0%, #0a0c14 70%);
  }
  .canvas-grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
  }

  /* ═══ CANVAS SVG EDGES ═══ */
  .edges-svg {
    position:absolute; inset:0; z-index:2;
    pointer-events:none; overflow:visible;
  }
  .edges-svg path.edge-line {
    fill:none; stroke:var(--text3); stroke-width:2;
    stroke-dasharray: 6,4;
    transition: stroke 0.4s, stroke-dasharray 0.4s;
  }
  .edges-svg path.edge-line.active { stroke:var(--accent); stroke-dasharray: none; }
  .edges-svg path.edge-line.done { stroke:var(--green); stroke-dasharray: none; stroke-width:2.5; }
  .edges-svg path.edge-arrow { fill:var(--text3); transition: fill 0.4s; }
  .edges-svg path.edge-arrow.active { fill:var(--accent); }
  .edges-svg path.edge-arrow.done { fill:var(--green); }

  /* Edge label */
  .edge-label {
    font-family:var(--mono); font-size:9px; fill:var(--text3);
    text-anchor:middle; dominant-baseline:middle;
    transition: fill 0.4s;
  }
  .edge-label.active { fill:var(--accent); }
  .edge-label.done { fill:var(--green); }

  /* ═══ CANVAS NODES ═══ */
  .canvas-nodes { position:absolute; inset:0; z-index:5; }

  .wf-node {
    position:absolute; min-width:190px;
    background: var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:12px 14px;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
    cursor:pointer; transition:all 0.25s;
  }
  .wf-node:hover {
    border-color:var(--accent);
    box-shadow:0 4px 24px var(--accent-glow);
    transform:translateY(-2px);
  }
  .wf-node .header { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .wf-node .header .icon-em { font-size:16px; }
  .wf-node .header .t { font-size:12px; font-weight:600; }
  .wf-node .header .type-badge {
    font-size:9px; padding:1px 6px; border-radius:3px;
    background:rgba(59,130,246,0.12); color:var(--accent); font-weight:500;
    margin-left:4px;
  }
  .wf-node .desc { font-size:11px; color:var(--text3); line-height:1.5; }
  .wf-node .status-badge {
    font-size:10px; padding:1px 8px; border-radius:3px;
    margin-left:auto; display:none; white-space:nowrap;
  }
  .wf-node .status-badge.running {
    display:none; background:rgba(59,130,246,0.12); color:var(--accent);
  }
  .wf-node .status-badge.success {
    display:none; background:var(--green-bg); color:var(--green);
  }
  .wf-node.executing { border-color:var(--accent); box-shadow:0 0 30px var(--accent-glow); }
  .wf-node.executing .status-badge.running { display:inline-block; }
  .wf-node.done { border-color:var(--green); }
  .wf-node.done .status-badge.success { display:inline-block; }
  .wf-node.failed { border-color:var(--red); }

  /* Node click hint */
  .wf-node .click-hint {
    position:absolute; right:-4px; top:-4px;
    background:var(--accent); color:#fff; font-size:9px;
    padding:2px 6px; border-radius:8px; opacity:0;
    transition:opacity 0.3s; white-space:nowrap; font-weight:500;
    z-index:10;
  }
  .wf-node.show-hint .click-hint { opacity:1; }

  /* ═══ DEMO OVERLAY ═══ */
  .demo-overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    z-index:20; pointer-events:none;
  }
  .demo-overlay > * { pointer-events:auto; }

  .demo-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:28px 36px; max-width:500px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    text-align:center;
  }
  .demo-card h2 { font-size:20px; margin-bottom:4px; }
  .demo-card .subtitle { font-size:13px; color:var(--text2); margin-bottom:18px; }
  .demo-card textarea {
    width:100%; padding:12px 14px; border-radius:8px;
    background:var(--bg); border:1px solid var(--border);
    color:var(--text); font-size:13px; font-family:var(--font);
    resize:vertical; min-height:72px; outline:none;
  }
  .demo-card textarea:focus { border-color:var(--accent); }

  .loading-bar {
    width:100%; height:3px; background:var(--border);
    border-radius:3px; overflow:hidden; margin:14px 0;
  }
  .loading-bar .fill {
    height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2));
    border-radius:3px; width:0; transition:width 0.3s;
  }
  #genLog {
    font-size:12px; color:var(--text3); font-family:var(--mono);
    text-align:left; max-height:140px; overflow-y:auto;
    line-height:1.8;
  }

  /* ═══ FLOATING GUIDE ═══ */
  .floating-guide {
    position:absolute; z-index:30;
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:10px 14px;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
    font-size:12px; display:flex; align-items:center; gap:10px;
    max-width:280px;
  }
  .floating-guide .fg-icon { font-size:18px; flex-shrink:0; }
  .floating-guide .fg-text { color:var(--text2); line-height:1.5; flex:1; }
  .floating-guide .fg-text strong { color:var(--text); }

  /* Guide arrow */
  .guide-arrow-box {
    position:absolute; z-index:31; pointer-events:none;
  }
  .guide-arrow {
    width:0; height:0;
    border-left:12px solid var(--accent);
    border-top:8px solid transparent;
    border-bottom:8px solid transparent;
  }

  /* ═══ STEP HINT BAR ═══ */
  .step-hint {
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    z-index:35;
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:6px 18px 6px 22px;
    display:flex; align-items:center; gap:10px;
    font-size:12px; color:var(--text2);
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
  }
  .step-hint .dots { display:flex; gap:4px; }
  .step-hint .dots .dot {
    width:6px; height:6px; border-radius:50%; background:var(--text3);
    transition:all 0.3s;
  }
  .step-hint .dots .dot.active { background:var(--accent); box-shadow:0 0 8px var(--accent-glow); }
  .step-hint .dots .dot.done { background:var(--green); }

  /* ═══ RIGHT PANEL ═══ */
  .panel {
    width:330px; background:var(--surface);
    border-left:1px solid var(--border); flex-shrink:0;
    display:flex; flex-direction:column;
  }
  .panel-header {
    padding:12px 14px; border-bottom:1px solid var(--border);
    font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px;
  }
  .panel-body { flex:1; overflow-y:auto; padding:14px; }

  .panel-placeholder {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:40px 20px; text-align:center; color:var(--text3); font-size:13px;
    gap:12px;
  }
  .panel-placeholder .big-icon { font-size:40px; opacity:0.5; }

  .config-row { margin-bottom:12px; }
  .config-row label { display:block; font-size:11px; color:var(--text3); margin-bottom:2px; font-weight:500; }
  .config-row input, .config-row select {
    width:100%; padding:7px 10px; border-radius:5px;
    background:var(--bg); border:1px solid var(--border);
    color:var(--text); font-size:12px; outline:none;
  }
  .config-row input:focus { border-color:var(--accent); }
  .config-row input[readonly] { color:var(--text2); cursor:default; }

  .schema-box {
    background:var(--bg); border-radius:5px; padding:10px 12px;
    font-family:var(--mono); font-size:10px; color:var(--text2); line-height:1.6;
    border:1px solid var(--border); white-space:pre; overflow-x:auto;
  }

  .node-type-indicator {
    display:flex; align-items:center; gap:10px;
    padding:10px 12px; background:var(--bg); border-radius:8px;
    margin-bottom:14px; border:1px solid var(--border);
  }
  .node-type-indicator .nt-icon { font-size:20px; }
  .node-type-indicator .nt-name { font-size:13px; font-weight:600; }
  .node-type-indicator .nt-desc { font-size:11px; color:var(--text3); }

  .section-hr { border:none; border-top:1px solid var(--border); margin:14px 0; }

  /* ═══ EXECUTION LOG ═══ */
  .exec-log {
    background:var(--bg); border:1px solid var(--border);
    border-radius:6px; padding:10px 12px; font-family:var(--mono);
    font-size:11px; line-height:1.7; max-height:200px; overflow-y:auto;
  }
  .exec-log .line { display:flex; gap:8px; }
  .exec-log .ts { color:var(--text3); flex-shrink:0; }
  .exec-log .ok { color:var(--green); }
  .exec-log .info { color:var(--accent); }

  /* ═══ RESULT MODAL ═══ */
  .result-overlay {
    position:absolute; inset:0; background:rgba(0,0,0,0.55);
    z-index:50; display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(3px);
  }
  .result-modal {
    width:480px; max-height:80vh; overflow-y:auto;
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:28px;
    box-shadow:0 24px 80px rgba(0,0,0,0.6);
  }
  .result-modal h2 { font-size:18px; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
  .result-modal .sub { color:var(--text2); font-size:13px; margin-bottom:16px; }
  .result-item {
    padding:10px 12px; background:var(--bg); border-radius:6px;
    margin-bottom:8px; border:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
  }
  .result-item .ri-icon { width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .result-item .ri-info { flex:1; }
  .result-item .ri-title { font-size:12px; font-weight:500; }
  .result-item .ri-detail { font-size:11px; color:var(--text3); }

  .result-data {
    background:var(--bg); border-radius:6px; padding:10px;
    font-family:var(--mono); font-size:11px; color:var(--text2);
    border:1px solid var(--border); white-space:pre; overflow-x:auto;
    margin-top:10px; line-height:1.5;
  }

  .hidden { display:none !important; }
  .fade-in { animation:fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .slide-up { animation:slideUp 0.4s ease forwards; }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .pulse-ring { animation:pulseRing 2s ease infinite; }
  @keyframes pulseRing {
    0% { box-shadow:0 0 0 0 rgba(59,130,246,0.4); }
    70% { box-shadow:0 0 0 12px transparent; }
    100% { box-shadow:0 0 0 0 transparent; }
  }
  .pulse-glow { animation:pulseGlow 1.5s ease infinite; }
  @keyframes pulseGlow {
    0%,100% { opacity:0.5; }
    50% { opacity:1; }
  }

  @media (max-width:900px) {
    .sidebar { display:none; }
    .panel { width:280px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ═══ TOP BAR ═══ -->
  <div class="topbar">
    <div class="logo"><span class="bolt">⚡</span> AgentFlow</div>
    <div class="sep"></div>
    <div class="bread">
      <span class="active">画布</span>
      <span style="color:var(--text3)">/</span>
      <span style="color:var(--text3)">PID控制器设计工作流</span>
    </div>
    <div class="topbar-right">
      <span class="status"><span class="dot-green"></span> 3 Agent 就绪</span>
      <button class="btn btn-sm" onclick="resetDemo()">🔄 重置</button>
    </div>
  </div>

  <!-- ═══ BODY ═══ -->
  <div class="body">

    <!-- ── SIDEBAR ── -->
    <div class="sidebar">
      <div class="section-title">📦 节点面板</div>
      <div class="palette" id="palette">
        <div class="palette-group">
          <div class="palette-group-title">🤖 AI Agent</div>
          <div class="palette-item"><span class="icon blue">🧮</span> 算法设计</div>
          <div class="palette-item"><span class="icon green">💻</span> 软件开发</div>
          <div class="palette-item"><span class="icon purple">🧪</span> 编译测试</div>
          <div class="palette-item"><span class="icon purple">📝</span> 文档生成</div>
        </div>
        <div class="palette-group">
          <div class="palette-group-title">🔧 工具</div>
          <div class="palette-item"><span class="icon orange">🔍</span> 搜索</div>
          <div class="palette-item"><span class="icon orange">📎</span> 文件读取</div>
          <div class="palette-item"><span class="icon blue">🌐</span> API 调用</div>
        </div>
      </div>
    </div>

    <!-- ── CANVAS ── -->
    <div class="canvas-wrap" id="canvasWrap">
      <div class="canvas-grid"></div>
      <svg class="edges-svg" id="edgesSvg"></svg>
      <div class="canvas-nodes" id="canvasNodes"></div>

      <!-- Floating guide -->
      <div class="floating-guide hidden" id="guideCanvas">
        <span class="fg-icon">👆</span>
        <span class="fg-text"><strong>点击任意节点</strong> 查看配置详情，或点击下方「运行」开始执行</span>
      </div>
      <div class="guide-arrow-box hidden" id="guideArrow">
        <div class="guide-arrow"></div>
      </div>

      <!-- Step 0: Welcome -->
      <div class="demo-overlay" id="demoOverlay">
        <div class="demo-card" id="stepWelcome">
          <div style="font-size:42px; margin-bottom:8px;">👋</div>
          <h2>欢迎使用 AgentFlow</h2>
          <p class="subtitle">输入需求 → AI 自动生成可视化工作流</p>
          <textarea id="reqInput">为四旋翼无人机设计PID控制器并生成C++代码，然后编译测试</textarea>
          <div style="margin-top:12px; display:flex; gap:10px; justify-content:center;">
            <button class="btn" onclick="document.getElementById('reqInput').value='为四旋翼无人机设计PID控制器 → Ziegler-Nichols方法整定；\n生成C++实现代码（ArduPilot框架）；\n编译测试通过 → 输出报告'">📋 示例</button>
            <button class="btn btn-primary" onclick="startGenerate()">🚀 AI 生成工作流</button>
          </div>
        </div>

        <!-- Step 1: Generating -->
        <div class="demo-card hidden" id="stepGenerating">
          <h2>🤖 AI 正在分析需求...</h2>
          <p class="subtitle">意图解析 → 任务分解 → 节点匹配 → DAG 生成</p>
          <div class="loading-bar"><div class="fill" id="loadingFill"></div></div>
          <div id="genLog"></div>
        </div>

        <!-- Step hint bar -->
        <div class="step-hint hidden" id="stepHint">
          <span id="stepHintText">步骤 0/4：输入需求</span>
          <div class="dots">
            <span class="dot done" data-s="0"></span>
            <span class="dot" data-s="1"></span>
            <span class="dot" data-s="2"></span>
            <span class="dot" data-s="3"></span>
          </div>
          <button class="btn btn-sm" id="stepNextBtn">下一步 →</button>
        </div>
      </div>
    </div>

    <!-- ── RIGHT PANEL ── -->
    <div class="panel" id="rightPanel">
      <div class="panel-header" id="panelTitle">📋 节点配置</div>
      <div class="panel-body" id="panelBody">
        <div class="panel-placeholder">
          <div class="big-icon">🔗</div>
          <div>点击画布上的节点<br>查看详细配置</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════

const NODES = [
  { id:'alg',  icon:'🧮', label:'算法设计',      type:'algorithm-designer',  desc:'Ziegler-Nichols → PID 参数',     x:200, y:80,  color:'blue' },
  { id:'dev',  icon:'💻', label:'C++ 代码实现',   type:'software-dev',        desc:'ArduPilot 框架 → PID 控制器',   x:70,  y:300, color:'green' },
  { id:'test', icon:'🧪', label:'编译与测试',     type:'compile-test',        desc:'scons 编译 + 单元测试 → 验证',  x:360, y:300, color:'purple' },
  { id:'doc',  icon:'📝', label:'输出报告',       type:'document-gen',        desc:'综合结果 → PDF 文档',          x:200, y:500, color:'orange' },
];

const EDGES = [
  { from:'alg', to:'dev', label:'PID 参数 {Kp,Ki,Kd}' },
  { from:'dev', to:'test', label:'C++ 源代码' },
  { from:'test', to:'doc', label:'测试报告' },
];

const NODE_META = {
  'algorithm-designer': { icon:'🧮', name:'算法设计 Agent', desc:'数值算法分析与参数整定' },
  'software-dev':       { icon:'💻', name:'软件开发 Agent', desc:'根据算法参数生成实现代码' },

function startGenerate() {

function showCanvas() {

function renderCanvas() {
  const container = document.getElementById('canvasNodes');
  container.innerHTML = '';
  NODES.forEach(n => {
    const el = document.createElement('div');
    el.className = 'wf-node fade-in';
    el.id = 'n-'+n.id;
    el.style.left = n.x+'px'; el.style.top = n.y+'px';
    el.onclick = () => showConfig(n.id);
    el.innerHTML =
      '<div class="header">'+
        '<span class="icon-em">'+n.icon+'</span>'+
        '<span class="t">'+n.label+'</span>'+
        '<span class="type-badge">'+n.type+'</span>'+
        '<span class="status-badge running">▶ 运行中</span>'+
        '<span class="status-badge success">✓ 完成</span>'+
        '<span class="click-hint">👆 点击配置</span>'+
      '</div>'+
      '<div class="desc">'+n.desc+'</div>';
    container.appendChild(el);
  });
  // Show click hint on first node after a short delay
  setTimeout(() => {
    const first = document.getElementById('n-alg');
    if (first) first.classList.add('show-hint');
  }, 1200);
}

function drawEdges() {
  const svg = document.getElementById('edgesSvg');
  svg.innerHTML = '';
  const cw = document.getElementById('canvasWrap');

  EDGES.forEach(e => {
    const fn = document.getElementById('n-'+e.from);
    const tn = document.getElementById('n-'+e.to);
    if (!fn || !tn) return;

    // Get node positions relative to canvas-wrap
    const fx = fn.offsetLeft + fn.offsetWidth;
    const fy = fn.offsetTop + fn.offsetHeight / 2;
    const tx = tn.offsetLeft;
    const ty = tn.offsetTop + tn.offsetHeight / 2;

    const cpx1 = fx + (tx - fx) * 0.35;
    const cpx2 = fx + (tx - fx) * 0.65;

    // Line path
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M ${fx} ${fy} C ${cpx1} ${fy}, ${cpx2} ${ty}, ${tx} ${ty}`);
    path.setAttribute('class','edge-line');

    // Arrow head (small triangle at the end)
    const arrowSize = 8;
    const angle = Math.atan2(ty - ((fy + ty)/2 + (ty - fy)*0.15), tx - ((fx + tx)/2 + (tx - fx)*0.15));
    const arrowPts = [
      `${tx},${ty}`,
      `${tx - arrowSize * Math.cos(angle - 0.4)},${ty - arrowSize * Math.sin(angle - 0.4)}`,
      `${tx - arrowSize * Math.cos(angle + 0.4)},${ty - arrowSize * Math.sin(angle + 0.4)}`
    ].join(' ');
    const arrow = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    arrow.setAttribute('points', arrowPts);
    arrow.setAttribute('class','edge-arrow');

    // Edge label
    const labelX = (fx + tx) / 2;
    const labelY = (fy + ty) / 2 - 10;
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', labelX);
    text.setAttribute('y', labelY);
    text.setAttribute('class','edge-label');
    text.textContent = e.label;

    svg.appendChild(path);
    svg.appendChild(arrow);
    svg.appendChild(text);
  });
}

// ═══════════════════════════════════════════════
// STEP 3: EXECUTION
// ═══════════════════════════════════════════════

function startExecution() {
  step = 3;
  updateStepUI();
  hide('guideCanvas');

  document.getElementById('panelTitle').textContent = '💻 执行日志';
  document.getElementById('panelBody').innerHTML =
    '<div class="exec-log" id="execLog"></div>'+
    '<div style="margin-top:10px;"><button class="btn btn-sm btn-danger" style="width:100%;" onclick="showResult()">⏭ 跳过 → 查看结果</button></div>'+
    '<div style="margin-top:6px;font-size:10px;color:var(--text3);text-align:center;">实际执行会逐个启动 Docker Agent</div>';

  const log = document.getElementById('execLog');
  let i = 0;
  execTimer = setInterval(() => {
    if (i >= EXEC_LOG.length) {
      clearInterval(execTimer); execTimer=null;
      document.getElementById('panelTitle').textContent = '✅ 执行完成';
      setTimeout(showResult, 800);
      return;
    }
    const l = EXEC_LOG[i];
    log.innerHTML += '<div class="line"><span class="ts">['+l.ts+']</span><span class="'+l.type+'">'+l.msg+'</span></div>';
    log.scrollTop = log.scrollHeight;

    // Update node statuses
    if (l.msg.includes('algorithm-designer')) {
      setNodeStatus('alg','executing');
      updateEdges();
    } else if (l.msg.includes('software-dev')) {
      setNodeStatus('alg','done'); setNodeStatus('dev','executing');
      updateEdges();
    } else if (l.msg.includes('compile-test')) {
      setNodeStatus('dev','done'); setNodeStatus('test','executing');
      updateEdges();
    } else if (l.msg.includes('document-gen')) {
      setNodeStatus('test','done'); setNodeStatus('doc','executing');
      updateEdges();
    } else if (l.msg.includes('工作流执行完毕')) {
      setNodeStatus('doc','done');
      updateEdges();
    }
    i++;
  }, 1200);
}

function setNodeStatus(id, status) {
  const el = document.getElementById('n-'+id);
  if (!el) return;
  el.classList.remove('executing','done','failed');
  if (status) el.classList.add(status);
}

function updateEdges() {
  const doneList = [];
  NODE_ORDER.forEach(id => {
    const el = document.getElementById('n-'+id);
    if (el && el.classList.contains('done')) doneList.push(id);
  });
  // Animate edges via class changes
  const svg = document.getElementById('edgesSvg');
  const paths = svg.querySelectorAll('.edge-line');
  const arrows = svg.querySelectorAll('.edge-arrow');
  const labels = svg.querySelectorAll('.edge-label');
  EDGES.forEach((e, i) => {
    if (doneList.includes(e.from)) {
      paths[i]?.classList.add('done');
      arrows[i]?.classList.add('done');
      labels[i]?.classList.add('done');
      paths[i]?.classList.remove('active');
    } else if (doneList.length > 0 && NODE_ORDER.indexOf(e.from) === doneList.length) {
      paths[i]?.classList.add('active');
      arrows[i]?.classList.add('active');
    }
  });
}

// ═══════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════

function $(id) { return document.getElementById(id); }
function show(id) { $(id).classList.remove('hidden'); }
function hide(id) { $(id).classList.add('hidden'); }

function updateStepUI() {
  const dots = document.querySelectorAll('.step-hint .dots .dot');
  dots.forEach((d,i) => {
    d.classList.toggle('done', i < step);
    d.classList.toggle('active', i === step);
  });
  const labels = ['输入需求','AI 生成','可视化画布','执行结果'];
  const btn = document.getElementById('stepNextBtn');
  if (step >= 3) {
    document.getElementById('stepHintText').textContent = '✅ 全部完成';
    btn.textContent = '🔄 重新演示';
    btn.onclick = resetDemo;
  } else if (step === 0) {
    document.getElementById('stepHintText').textContent = '步骤 1/4：输入需求';
    btn.textContent = '⏭ 跳过';
    btn.onclick = startGenerate;
  } else if (step === 1) {
    document.getElementById('stepHintText').textContent = '步骤 2/4：AI 生成中';
    btn.textContent = '⏭ 跳过';
    btn.onclick = function() {
      if (genTimer) { clearInterval(genTimer); genTimer=null; }
      document.getElementById('loadingFill').style.width = '100%';
      showCanvas();
    };
  } else if (step === 2) {
    document.getElementById('stepHintText').textContent = '步骤 3/4：查看画布';
    btn.textContent = '▶ 运行工作流';
    btn.onclick = startExecution;
  }
}

function resetDemo() {
  if (genTimer) { clearInterval(genTimer); genTimer=null; }
  if (execTimer) { clearInterval(execTimer); execTimer=null; }
  step = 0;

  const ov = document.getElementById('resultOverlay');
  if (ov) ov.remove();

  document.getElementById('canvasNodes').innerHTML = '';
  document.getElementById('edgesSvg').innerHTML = '';

  document.getElementById('panelTitle').textContent = '📋 节点配置';
  document.getElementById('panelBody').innerHTML =
    '<div class="panel-placeholder"><div class="big-icon">🔗</div><div>点击画布上的节点<br>查看详细配置</div></div>';

  show('stepWelcome');
  hide('stepGenerating');
  hide('stepHint');
  hide('guideCanvas');
  document.getElementById('genLog').innerHTML = '';
  document.getElementById('loadingFill').style.width = '0%';
}
