<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentFlow — 画布交互 Demo</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d2e; --surface2: #232742;
    --border: #2a2e42; --border-hl: #3b5b8a;
    --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --accent: #3b82f6; --accent2: #7c3aed; --accent-glow: rgba(59,130,246,0.3);
    --green: #10b981; --green-bg: rgba(16,185,129,0.12);
    --orange: #f59e0b; --red: #ef4444;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font); line-height:1.6;
    overflow: hidden; height: 100vh;
  }

  /* ═══ APP LAYOUT ═══ */
  .app { display:flex; flex-direction:column; height:100vh; }

  /* ── Top Bar ── */
  .topbar {
    display:flex; align-items:center; gap:16px;
    padding:0 20px; height:52px;
    background: var(--surface); border-bottom:1px solid var(--border);
    flex-shrink:0; z-index:50;
  }
  .topbar .logo { font-weight:700; font-size:18px; display:flex; align-items:center; gap:8px; }
  .topbar .logo .bolt { color:var(--accent); }
  .topbar .sep { width:1px; height:24px; background:var(--border); }
  .topbar .bread { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text3); }
  .topbar .bread .active { color:var(--text); font-weight:500; }
  .topbar-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
  .topbar-right .status { font-size:12px; color:var(--text3); display:flex; align-items:center; gap:6px; }
  .dot-green { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; }

  .btn {
    padding:6px 16px; border-radius:6px; border:1px solid var(--border);
    background:var(--surface2); color:var(--text); font-size:13px;
    cursor:pointer; transition:all 0.15s; font-family:var(--font);
  }
  .btn:hover { border-color:var(--accent); color:#fff; }
  .btn-primary {
    background:var(--accent); border-color:var(--accent); color:#fff;
    font-weight:500;
  }
  .btn-primary:hover { background:#2563eb; box-shadow:0 0 20px var(--accent-glow); }
  .btn-success { background:var(--green); border-color:var(--green); color:#fff; }
  .btn-danger { background:var(--red); border-color:var(--red); color:#fff; }

  /* ── Body ── */
  .body { display:flex; flex:1; overflow:hidden; }

  /* ── Left Sidebar ── */
  .sidebar {
    width:220px; background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; flex-shrink:0;
  }
  .sidebar-header {
    padding:12px 16px; font-size:11px; text-transform:uppercase;
    letter-spacing:1px; color:var(--text3); border-bottom:1px solid var(--border);
  }
  .sidebar-search {
    margin:10px 12px; padding:8px 12px; border-radius:6px;
    background:var(--bg); border:1px solid var(--border);
    color:var(--text2); font-size:13px; outline:none;
  }
  .sidebar-search:focus { border-color:var(--accent); }
  .palette { flex:1; overflow-y:auto; padding:8px; }
  .palette-group { margin-bottom:16px; }
  .palette-group-title { font-size:11px; color:var(--text3); padding:4px 8px; margin-bottom:4px; font-weight:600; letter-spacing:0.5px; }
  .palette-item {
    display:flex; align-items:center; gap:10px;
    padding:8px 10px; border-radius:6px; cursor:grab;
    font-size:13px; color:var(--text2);
    transition:all 0.15s;
  }
  .palette-item:hover { background:var(--surface2); color:var(--text); }
  .palette-item .icon { width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .palette-item .icon.blue { background:rgba(59,130,246,0.15); }
  .palette-item .icon.green { background:rgba(16,185,129,0.15); }
  .palette-item .icon.purple { background:rgba(124,58,237,0.15); }
  .palette-item .icon.orange { background:rgba(245,158,11,0.15); }

  /* ── Canvas ── */
  .canvas-wrap {
    flex:1; position:relative; overflow:hidden;
    background: radial-gradient(ellipse at 50% 40%, #131736 0%, #0a0c14 70%);
  }
  .canvas-grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
  }

  /* ── DEMO Overlay (step-by-step) ── */
  .demo-overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    z-index:20; pointer-events:none;
  }
  .demo-overlay > * { pointer-events:auto; }

  .demo-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:32px 40px; max-width:560px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    text-align:center;
  }
  .demo-card h2 { font-size:20px; margin-bottom:6px; }
  .demo-card p { font-size:14px; color:var(--text2); margin-bottom:20px; }
  .demo-card textarea {
    width:100%; padding:12px 16px; border-radius:8px;
    background:var(--bg); border:1px solid var(--border);
    color:var(--text); font-size:14px; font-family:var(--font);
    resize:vertical; min-height:80px; outline:none;
    transition:border-color 0.2s;
  }
  .demo-card textarea:focus { border-color:var(--accent); }

  /* ── Canvas Nodes (placed by JS) ── */
  .canvas-nodes { position:absolute; inset:0; z-index:5; }

  .wf-node {
    position:absolute; min-width:200px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:14px 16px;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
    cursor:pointer; transition:all 0.3s;
    z-index:5;
  }
  .wf-node:hover { border-color:var(--accent); box-shadow:0 4px 24px var(--accent-glow); }
  .wf-node .header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .wf-node .header .t { font-size:13px; font-weight:600; }
  .wf-node .header .type-badge { font-size:10px; padding:2px 8px; border-radius:4px; font-weight:500; }
  .wf-node .desc { font-size:12px; color:var(--text3); line-height:1.5; }
  .wf-node .ports { display:flex; justify-content:space-between; margin-top:10px; }
  .wf-node .port {
    width:10px; height:10px; border-radius:50%;
    border:2px solid var(--border); background:var(--surface);
    cursor:crosshair; transition:all 0.2s;
  }
  .wf-node .port:hover { border-color:var(--accent); background:var(--accent); }

  .wf-node .status-badge {
    font-size:11px; padding:2px 8px; border-radius:4px;
    margin-left:auto; display:none;
  }
  .wf-node.executing { border-color:var(--accent); box-shadow:0 0 30px var(--accent-glow); }
  .wf-node.executing .status-badge.running { display:block; background:rgba(59,130,246,0.15); color:var(--accent); }
  .wf-node.done { border-color:var(--green); }
  .wf-node.done .status-badge.success { display:block; background:var(--green-bg); color:var(--green); }
  .wf-node.failed { border-color:var(--red); }

  /* ── SVG edges ── */
  .edges-svg { position:absolute; inset:0; z-index:1; pointer-events:none; }
  .edges-svg path { stroke:var(--border); stroke-width:2; fill:none; }
  .edges-svg path.active { stroke:var(--accent); stroke-width:2.5; }
  .edges-svg path.done { stroke:var(--green); stroke-width:2.5; }

  /* ── Right Panel ── */
  .panel {
    width:340px; background:var(--surface);
    border-left:1px solid var(--border); flex-shrink:0;
    display:flex; flex-direction:column;
  }
  .panel-header {
    padding:14px 16px; border-bottom:1px solid var(--border);
    font-size:13px; font-weight:600;
  }
  .panel-body { flex:1; overflow-y:auto; padding:16px; }

  .config-row { margin-bottom:16px; }
  .config-row label { display:block; font-size:12px; color:var(--text3); margin-bottom:4px; }
  .config-row input, .config-row select {
    width:100%; padding:8px 12px; border-radius:6px;
    background:var(--bg); border:1px solid var(--border);
    color:var(--text); font-size:13px; outline:none;
  }
  .config-row input:focus { border-color:var(--accent); }
  .config-row .schema-box {
    background:var(--bg); border-radius:6px; padding:10px 12px;
    font-family:var(--mono); font-size:11px; color:var(--text2);
    border:1px solid var(--border); white-space:pre; overflow-x:auto;
  }

  .node-type-indicator {
    display:flex; align-items:center; gap:10px;
    padding:12px 14px; background:var(--bg); border-radius:8px;
    margin-bottom:16px; border:1px solid var(--border);
  }
  .node-type-indicator .nt-icon { font-size:20px; }
  .node-type-indicator .nt-info { }
  .node-type-indicator .nt-name { font-size:14px; font-weight:600; }
  .node-type-indicator .nt-desc { font-size:12px; color:var(--text3); }

  /* ── Step indicators ── */
  .step-hint {
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    z-index:30; display:flex; align-items:center; gap:8px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:6px 16px 6px 20px;
    font-size:12px; color:var(--text2);
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
    pointer-events:auto;
  }
  .step-hint .dots { display:flex; gap:4px; margin:0 4px; }
  .step-hint .dots .dot { width:6px; height:6px; border-radius:50%; background:var(--text3); }
  .step-hint .dots .dot.active { background:var(--accent); }
  .step-hint .dots .dot.done { background:var(--green); }

  /* ── Utility ── */
  .hidden { display:none !important; }
  .fade-in { animation:fadeIn 0.5s ease forwards; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .slide-up { animation:slideUp 0.4s ease forwards; }
  @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

  .pulse-ring {
    animation:pulseRing 2s ease infinite;
  }
  @keyframes pulseRing {
    0% { box-shadow:0 0 0 0 var(--accent-glow); }
    70% { box-shadow:0 0 0 12px transparent; }
    100% { box-shadow:0 0 0 0 transparent; }
  }

  .loading-bar {
    width:100%; height:3px; background:var(--border);
    border-radius:3px; overflow:hidden; margin:16px 0;
  }
  .loading-bar .fill {
    height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2));
    border-radius:3px; width:0; transition:width 0.3s;
  }

  /* ── Execution terminal ── */
  .exec-log {
    background:var(--bg); border:1px solid var(--border);
    border-radius:8px; padding:12px 14px; font-family:var(--mono);
    font-size:12px; line-height:1.7; max-height:180px; overflow-y:auto;
  }
  .exec-log .line { display:flex; gap:8px; }
  .exec-log .ts { color:var(--text3); }
  .exec-log .ok { color:var(--green); }
  .exec-log .info { color:var(--accent); }
  .exec-log .warn { color:var(--orange); }

  /* ── Result modal ── */
  .result-overlay {
    position:absolute; inset:0; background:rgba(0,0,0,0.6);
    z-index:40; display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
  }
  .result-modal {
    width:500px; max-height:80vh; overflow-y:auto;
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:32px;
    box-shadow:0 24px 80px rgba(0,0,0,0.6);
  }
  .result-modal h2 { font-size:20px; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
  .result-modal .sub { color:var(--text2); font-size:14px; margin-bottom:20px; }
  .result-item {
    padding:12px 14px; background:var(--bg); border-radius:8px;
    margin-bottom:10px; border:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
  }
  .result-item .ri-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .result-item .ri-info { flex:1; }
  .result-item .ri-title { font-size:13px; font-weight:500; }
  .result-item .ri-detail { font-size:12px; color:var(--text3); }

  .result-data {
    background:var(--bg); border-radius:8px; padding:14px;
    font-family:var(--mono); font-size:12px; color:var(--text2);
    border:1px solid var(--border); white-space:pre; overflow-x:auto;
    margin-top:12px;
  }

  @media (max-width:900px) {
    .sidebar { display:none; }
    .panel { width:280px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ═══ Top Bar ═══ -->
  <div class="topbar">
    <div class="logo"><span class="bolt">⚡</span> AgentFlow</div>
    <div class="sep"></div>
    <div class="bread">
      <span class="active">画布</span>
      <span style="color:var(--text3)">/</span>
      <span style="color:var(--text3)">未命名工作流</span>
    </div>
    <div class="topbar-right">
      <span class="status"><span class="dot-green"></span> Agent 就绪</span>
      <button class="btn" onclick="resetDemo()">🔄 重置</button>
    </div>
  </div>

  <!-- ═══ Body ═══ -->
  <div class="body">

    <!-- ── Sidebar ── -->
    <div class="sidebar">
      <div class="sidebar-header">📦 节点面板</div>
      <input class="sidebar-search" placeholder="搜索节点类型..." value="" oninput="filterPalette(this.value)">
      <div class="palette">
        <div class="palette-group">
          <div class="palette-group-title">🤖 AI Agent</div>
          <div class="palette-item" draggable="true"><span class="icon blue">🧮</span> 算法设计</div>
          <div class="palette-item" draggable="true"><span class="icon green">💻</span> 软件开发</div>
          <div class="palette-item" draggable="true"><span class="icon purple">🧪</span> 编译测试</div>
          <div class="palette-item" draggable="true"><span class="icon purple">📝</span> 文档生成</div>
        </div>
        <div class="palette-group">
          <div class="palette-group-title">🔧 工具</div>
          <div class="palette-item" draggable="true"><span class="icon orange">🔍</span> 搜索</div>
          <div class="palette-item" draggable="true"><span class="icon orange">📎</span> 文件读取</div>
          <div class="palette-item" draggable="true"><span class="icon blue">🌐</span> API 调用</div>
        </div>
      </div>
    </div>

    <!-- ── Canvas ── -->
    <div class="canvas-wrap" id="canvasWrap">
      <div class="canvas-grid"></div>

      <!-- SVG edges layer -->
      <svg class="edges-svg" id="edgesSvg"></svg>

      <!-- Nodes layer -->
      <div class="canvas-nodes" id="canvasNodes"></div>

      <!-- Demo Overlay (Step 0: Welcome) -->
      <div class="demo-overlay" id="demoOverlay">
        <div class="demo-card" id="stepWelcome">
          <h2>👋 欢迎使用 AgentFlow</h2>
          <p>输入你的需求，AI 自动生成可视化工作流</p>
          <textarea id="reqInput" placeholder="例如：为四旋翼无人机设计PID控制器并生成C++代码，然后编译测试">为四旋翼无人机设计PID控制器并生成C++代码，然后编译测试</textarea>
          <div style="margin-top:12px; display:flex; gap:10px; justify-content:center;">
            <button class="btn" onclick="showExample()">📋 查看示例</button>
            <button class="btn btn-primary" onclick="startGenerate()">🚀 AI 生成工作流</button>
          </div>
        </div>

        <!-- Step 1: Generating -->
        <div class="demo-card hidden" id="stepGenerating">
          <h2>🤖 AI 正在分析你的需求...</h2>
          <p>正在解析意图 → 分解任务 → 匹配节点 → 生成工作流</p>
          <div class="loading-bar"><div class="fill" id="loadingFill"></div></div>
          <div id="genLog" style="font-size:12px; color:var(--text3); font-family:var(--mono); text-align:left;"></div>
        </div>

        <!-- Step 2: Generated - show canvas -->
        <!-- (embedded directly) -->

        <!-- Execution terminal overlay -->
        <div class="step-hint hidden" id="stepHint">
          <span id="stepHintText">步骤 0/4：输入需求</span>
          <div class="dots">
            <span class="dot done" data-s="0"></span>
            <span class="dot" data-s="1"></span>
            <span class="dot" data-s="2"></span>
            <span class="dot" data-s="3"></span>
          </div>
          <button class="btn" id="stepNextBtn" style="font-size:11px; padding:4px 12px;" onclick="nextStep()">下一步 →</button>
        </div>
      </div>
    </div>

    <!-- ── Right Panel ── -->
    <div class="panel" id="rightPanel">
      <div class="panel-header" id="panelTitle">📋 节点配置</div>
      <div class="panel-body" id="panelBody">
        <div style="text-align:center; color:var(--text3); padding:40px 0; font-size:14px;">
          点击画布上的节点<br>查看配置详情
        </div>
      </div>
    </div>

  </div><!-- /body -->

</div><!-- /app -->

<script>
// ═══════════════════════════════════════════
// DEMO DATA
// ═══════════════════════════════════════════

const DEMO_STEPS = [
  { id:'input', label:'输入需求' },
  { id:'generate', label:'AI 生成' },
  { id:'canvas', label:'可视化工作流' },
  { id:'execute', label:'执行与结果' },
];

const WORKFLOW_NODES = [
  {
    id:'alg', type:'algorithm-designer', icon:'🧮', color:'blue',
    label:'算法设计', desc:'Ziegler-Nichols 方法 → PID 参数',
    x:180, y:80, width:220,
    output: { Kp:'number', Ki:'number', Kd:'number' }
  },
  {
    id:'dev', type:'software-dev', icon:'💻', color:'green',
    label:'C++ 代码实现', desc:'基于 ArduPilot 框架 → PID 控制器',
    x:80, y:280, width:220,
    input: '$ref:alg/output',
    output: { source_code:'string' }
  },
  {
    id:'test', type:'compile-test', icon:'🧪', color:'purple',
    label:'编译与测试', desc:'scons 编译 + 单元测试 → 验证报告',
    x:340, y:280, width:220,
    input: '$ref:dev/output',
    output: { passed:'boolean', errors:'array' }
  },
  {
    id:'doc', type:'document-gen', icon:'📝', color:'orange',
    label:'输出报告', desc:'综合结果 → PDF 文档',
    x:180, y:460, width:220,
    input: '$ref:test/output',
    output: { report_url:'string' }
  }
];

const WORKFLOW_EDGES = [
  { from:'alg', to:'dev' },
  { from:'dev', to:'test' },
  { from:'test', to:'doc' },
];

const NODE_TYPE_META = {
  'algorithm-designer': { icon:'🧮', name:'算法设计', desc:'算法分析与参数整定，输出数值参数' },
  'software-dev': { icon:'💻', name:'软件开发', desc:'根据上层参数/算法编写实现代码' },
  'compile-test': { icon:'🧪', name:'编译测试', desc:'编译验证 + 单元测试执行' },
  'document-gen': { icon:'📝', name:'文档生成', desc:'综合结果生成可交付文档' },
};

const EXECUTION_LOG = [
  { ts:'00:00', msg:'Orchestrator 启动', type:'info' },
  { ts:'00:02', msg:'算法设计 Agent 启动 (Docker容器)', type:'info' },
  { ts:'00:05', msg:'→ Ziegler-Nichols 频率响应分析完成', type:'ok' },
  { ts:'00:08', msg:'→ Kp=2.5, Ki=1.0, Kd=0.3', type:'ok' },
  { ts:'00:10', msg:'软件开发 Agent 启动', type:'info' },
  { ts:'00:15', msg:'→ PID 控制器 C++ 代码生成完成', type:'ok' },
  { ts:'00:18', msg:'编译测试 Agent 启动', type:'info' },
  { ts:'00:22', msg:'→ scons --board=cuav-v5 编译通过 ✓', type:'ok' },
  { ts:'00:25', msg:'→ 单元测试 12/12 通过 ✓', type:'ok' },
  { ts:'00:27', msg:'输出报告 Agent 启动', type:'info' },
  { ts:'00:30', msg:'→ PDF 报告生成完成', type:'ok' },
  { ts:'00:32', msg:'✅ 工作流完成，Bom 已生成', type:'ok' },
];

let currentStep = 0;
let generatingInterval = null;
let execInterval = null;

// ═══════════════════════════════════════════
// DEMO FLOW
// ═══════════════════════════════════════════

function showExample() {
  document.getElementById('reqInput').value =
    '为四旋翼无人机设计PID控制器 → Ziegler-Nichols方法整定；\n生成C++实现代码（ArduPilot框架）；\n编译并测试通过 → 输出完整报告';
}

function startGenerate() {
  const input = document.getElementById('reqInput').value.trim();
  if (!input) { document.getElementById('reqInput').focus(); return; }

  // Hide welcome, show generating
  document.getElementById('stepWelcome').classList.add('hidden');
  document.getElementById('stepGenerating').classList.remove('hidden');
  document.getElementById('stepHint').classList.remove('hidden');
  currentStep = 1;
  updateStepHint(1);

  // Simulate generation progress
  const log = document.getElementById('genLog');
  log.innerHTML = '';
  const fill = document.getElementById('loadingFill');
  fill.style.width = '0%';

  const steps = [
    { p:10, msg:'📡 解析用户需求...' },
    { p:25, msg:'🔍 意图识别: 算法设计 + 代码实现 + 编译测试' },
    { p:40, msg:'🔗 匹配节点类型... algorithm-designer ✓' },
    { p:50, msg:'🔗 matching software-dev ✓, compile-test ✓' },
    { p:65, msg:'🧩 自动拓扑排序: alg → dev → test' },
    { p:80, msg:'📦 渲染节点模板...' },
    { p:95, msg:'✅ 工作流 DAG 构建完成!' },
    { p:100, msg:'🎯 即将打开可视化画布...' },
  ];

  let i = 0;
  generatingInterval = setInterval(() => {
    if (i >= steps.length) {
      clearInterval(generatingInterval);
      setTimeout(() => showCanvas(), 500);
      return;
    }
    const s = steps[i];
    fill.style.width = s.p + '%';
    log.innerHTML += `<div style="margin-top:4px;">${s.msg}</div>`;
    log.scrollTop = log.scrollHeight;
    i++;
  }, 700);
}

function showCanvas() {
  document.getElementById('stepGenerating').classList.add('hidden');
  currentStep = 2;
  updateStepHint(2);

  // Render nodes
  renderWorkflow();

  // Update panel
  document.getElementById('panelTitle').textContent = '🎯 工作流概览';
  document.getElementById('panelBody').innerHTML = `
    <div style="margin-bottom:16px;">
      <div class="node-type-indicator">
        <div class="nt-icon">🎯</div>
        <div class="nt-info">
          <div class="nt-name">工作流已生成</div>

        </div>
      </div>
    </div>
    <div style="font-size:13px; color:var(--text2); margin-bottom:12px;">
      <strong style="color:var(--text);">全局上下文</strong>
    </div>
    <div class="schema-box">{
  "goal": "为四旋翼无人机设计PID控制器",

function renderWorkflow() {
  const container = document.getElementById('canvasNodes');
  container.innerHTML = '';

  WORKFLOW_NODES.forEach(n => {
    const el = document.createElement('div');
    el.className = 'wf-node fade-in';
    el.id = 'node-' + n.id;
    el.style.left = n.x + 'px';
    el.style.top = n.y + 'px';
    el.style.width = n.width + 'px';
    el.onclick = () => showNodeConfig(n.id);

    el.innerHTML = `
      <div class="header">
        <span style="font-size:16px;">${n.icon}</span>
        <span class="t">${n.label}</span>
        <span class="type-badge" style="background:rgba(59,130,246,0.12);color:var(--accent);font-size:10px;">${n.type}</span>
        <span class="status-badge running">▶ 运行中</span>
        <span class="status-badge success">✓ 完成</span>
        <span class="status-badge failed">✗ 失败</span>
      </div>
      <div class="desc">${n.desc}</div>
      <div class="ports">
        <div class="port" title="输入端口"></div>
        <div class="port" title="输出端口"></div>
      </div>
    `;
    container.appendChild(el);
  });

  // Draw edges
  drawEdges();
}

function drawEdges(activeId, doneIds) {
  const svg = document.getElementById('edgesSvg');
  svg.innerHTML = '';

  WORKFLOW_EDGES.forEach(e => {
    const from = document.getElementById('node-' + e.from);
    const to = document.getElementById('node-' + e.to);
    if (!from || !to) return;

    const fromRect = from.getBoundingClientRect();
    const toRect = to.getBoundingClientRect();
    const canvasRect = document.getElementById('canvasWrap').getBoundingClientRect();

    const x1 = from.offsetLeft + from.offsetWidth;
    const y1 = from.offsetTop + from.offsetHeight / 2;
    const x2 = to.offsetLeft;
    const y2 = to.offsetTop + to.offsetHeight / 2;

    const cx1 = x1 + (x2 - x1) * 0.4;
    const cx2 = x1 + (x2 - x1) * 0.6;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const d = `M ${x1} ${y1} C ${cx1} ${y1}, ${cx2} ${y2}, ${x2} ${y2}`;
    path.setAttribute('d', d);

    let cls = '';
    if (doneIds && doneIds.includes(e.from)) cls = 'done';
    else if (activeId === e.from) cls = 'active';
    path.setAttribute('class', cls);

    svg.appendChild(path);
  });
}

// ═══════════════════════════════════════════
// EXECUTION
// ═══════════════════════════════════════════

function startExecution() {
  currentStep = 3;
  updateStepHint(3);

  document.getElementById('panelTitle').textContent = '💻 执行日志';
  document.getElementById('panelBody').innerHTML = `
    <div class="exec-log" id="execLog"></div>
    <div style="margin-top:12px;">
      <button class="btn btn-danger" style="width:100%;" onclick="showResult()">⏭ 跳过 → 查看结果</button>
    </div>
    <div style="margin-top:8px; font-size:11px; color:var(--text3); text-align:center;">实际执行会逐个启动 Docker 容器</div>
  `;

  // Animate execution
  const log = document.getElementById('execLog');
  let i = 0;
  const nodeOrder = ['alg','dev','test','doc'];

  execInterval = setInterval(() => {
    if (i >= EXECUTION_LOG.length) {
      clearInterval(execInterval);
      document.getElementById('panelTitle').textContent = '✅ 执行完成';
      setTimeout(showResult, 1000);
      return;
    }
    const l = EXECUTION_LOG[i];
    log.innerHTML += `<div class="line"><span class="ts">[${l.ts}]</span><span class="${l.type}">${l.msg}</span></div>`;
    log.scrollTop = log.scrollHeight;

    // Update node status
    if (l.msg.includes('算法设计 Agent')) {
      markNodeStatus('alg', 'executing');
    } else if (l.msg.includes('软件开发 Agent')) {
      markNodeStatus('alg', 'done');
      markNodeStatus('dev', 'executing');
    } else if (l.msg.includes('编译测试 Agent')) {
      markNodeStatus('dev', 'done');
      markNodeStatus('test', 'executing');
    } else if (l.msg.includes('输出报告 Agent')) {
      markNodeStatus('test', 'done');
      markNodeStatus('doc', 'executing');
    } else if (l.msg.includes('工作流完成')) {
      markNodeStatus('doc', 'done');
    }

    // Update edges
    const doneNodes = [];
    nodeOrder.forEach(id => {
      const node = document.getElementById('node-' + id);
      if (node && node.classList.contains('done')) doneNodes.push(id);
    });
    drawEdges(null, doneNodes);

    i++;
  }, 1200);
}

function markNodeStatus(id, status) {
  const node = document.getElementById('node-' + id);
  if (!node) return;
  node.classList.remove('executing','done','failed');
  if (status) node.classList.add(status);
}

function showResult() {
  clearInterval(execInterval);
  const overlay = document.createElement('div');
  overlay.className = 'result-overlay fade-in';
  overlay.id = 'resultOverlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  overlay.innerHTML = `
    <div class="result-modal slide-up">
      <h2>✅ 工作流执行完成</h2>
      <div class="sub">3 个 Agent · 32 秒 · 4,215 tokens</div>

      </div>
      <div class="result-item">
        <div class="ri-icon" style="background:rgba(16,185,129,0.12);">💻</div>
        <div class="ri-info">
          <div class="ri-title">C++ 代码实现</div>
          <div class="ri-detail">PID.cpp, PID.h → 136 行</div>
        </div>
        <span style="font-size:12px;color:var(--green);font-weight:500;">✓</span>
      </div>
      <div class="result-item">
        <div class="ri-icon" style="background:rgba(124,58,237,0.12);">🧪</div>
        <div class="ri-info">
          <div class="ri-title">编译测试</div>
          <div class="ri-detail">编译通过 · 12/12 测试通过</div>
        </div>
        <span style="font-size:12px;color:var(--green);font-weight:500;">✓</span>
      </div>

      <div class="result-data" id="resultData">{ "report": "PID_Controller_Report.pdf" }</div>

        <button class="btn" onclick="this.closest('.result-overlay').remove()">关闭</button>
        <button class="btn btn-success" onclick="alert('📄 报告已导出！')">📄 导出报告</button>

  document.getElementById('canvasWrap').appendChild(overlay);

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════

function updateStepHint(step) {
  document.querySelectorAll('.step-hint .dots .dot').forEach((d, i) => {
    d.classList.toggle('done', i < step);
    d.classList.toggle('active', i === step);
  });
  const labels = ['输入需求','AI 生成','可视化画布','执行结果'];
  document.getElementById('stepHintText').textContent =
    step >= 4 ? '✅ 完成' : `步骤 ${step}/3：${labels[step] || ''}`;

  const btn = document.getElementById('stepNextBtn');
  if (step >= 3) {
    btn.textContent = '🔄 重来';
    btn.onclick = resetDemo;
  } else {
    btn.textContent = '下一步 →';
    btn.onclick = nextStep;
  }
}

function nextStep() {
  if (currentStep === 0) {
    startGenerate();
  } else if (currentStep === 1) {
    // If still generating, speed it up
    if (generatingInterval) {
      clearInterval(generatingInterval);
      generatingInterval = null;
      document.getElementById('loadingFill').style.width = '100%';
      showCanvas();
    }
  } else if (currentStep === 2) {
    startExecution();
  }
}

function resetDemo() {
  // Clear all state
  if (generatingInterval) clearInterval(generatingInterval);
  if (execInterval) clearInterval(execInterval);
  generatingInterval = null;
  execInterval = null;
  currentStep = 0;

  // Remove result overlay
  const overlay = document.getElementById('resultOverlay');
  if (overlay) overlay.remove();

  // Clear canvas
  document.getElementById('canvasNodes').innerHTML = '';
  document.getElementById('edgesSvg').innerHTML = '';

  // Reset panels
  document.getElementById('panelTitle').textContent = '📋 节点配置';
  document.getElementById('panelBody').innerHTML = `
    <div style="text-align:center; color:var(--text3); padding:40px 0; font-size:14px;">
      点击画布上的节点<br>查看配置详情
    </div>
  `;

  // Show welcome step
  document.getElementById('stepWelcome').classList.remove('hidden');
  document.getElementById('stepGenerating').classList.add('hidden');
  document.getElementById('stepHint').classList.add('hidden');

  document.getElementById('genLog').innerHTML = '';
  document.getElementById('loadingFill').style.width = '0%';
}

function filterPalette(q) {
  document.querySelectorAll('.palette-item').forEach(el => {
    el.style.display = el.textContent.includes(q) || !q ? 'flex' : 'none';
  });
}
