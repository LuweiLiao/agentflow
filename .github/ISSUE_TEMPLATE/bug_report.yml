name: 🐛 Bug Report
description: Report something that is broken or behaves unexpectedly
title: "[bug]: "
labels: ["bug"]
projects: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        > 🌏 **中文说明**：你可以用中文填写此表单，但请尽量用英文以便更多开发者参与讨论。
        >
        > Thanks for taking the time to file a bug report! Please fill out the form below
        > so we can reproduce and fix the issue quickly.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting.
      options:
        - label: I have searched the [existing issues](https://github.com/LuweiLiao/agentflow/issues?q=is%3Aissue+label%3Abug) for a duplicate report.
          required: true
        - label: I have read the [Contributing Guidelines](https://github.com/LuweiLiao/agentflow/blob/main/CONTRIBUTING.md).
          required: true
        - label: I am running the latest version of AgentFlow (or have noted my version below).
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Detailed steps so we can reproduce the behavior.
      placeholder: |
        1. Start the backend with `python agentflow-backend.py`
        2. Open the canvas at http://127.0.0.1:5173
        3. Describe a workflow: "..."
        4. Click "Run"
        5. Observe error in the SSE stream / console.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Paste relevant logs, stack traces, or screenshots.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      multiple: true
      options:
        - Backend / orchestrator
        - Agent runtime
        - Prompt compiler
        - Frontend / canvas UI
        - SSE streaming
        - CLI / config
        - Docker / deployment
        - Other
    validations:
      required: true

  - type: input
    id: agentflow-version
    attributes:
      label: AgentFlow version
      description: Output of `git rev-parse --short HEAD` or the release tag. If unsure, write "main @ <date>".
      placeholder: "e.g. v1.0.0 or a1b2c3d"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.7"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OS
      description: For UI issues only. Backend-only issues can write "N/A".
      placeholder: "e.g. Chrome 124 on macOS 14.4"

  - type: input
    id: llm-provider
    attributes:
      label: LLM provider in use
      placeholder: "e.g. ZAI (GLM-4.6), DeepSeek-V3, OpenAI GPT-4o"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Paste any backend stdout, SSE payload, or browser console errors. Long logs can be attached as a file.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Workarounds, related issues, screenshots, or context.

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting, you agree to follow our [Code of Conduct](https://github.com/LuweiLiao/agentflow/blob/main/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow AgentFlow's Code of Conduct.
          required: true
