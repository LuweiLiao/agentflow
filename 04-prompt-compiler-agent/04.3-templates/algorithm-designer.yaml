# =============================================================================
# 模板：algorithm-designer
# 用途：算法设计与分析工作流
# 版本：1.0.0
# =============================================================================
name: "algorithm-designer"
version: "1.0.0"
description: >
  算法设计与分析工作流模板。
  适用于从问题描述出发，进行算法设计、复杂度分析、正确性证明
  以及代码实现的完整链路。

engine:
  runtime: "claude-code"
  model_recommendation: "claude-sonnet-4"

params_schema:
  type: object
  properties:
    problem_description:
      type: string
      description: "算法问题的详细描述，包括输入输出定义"
    language:
      type: string
      description: "实现语言"
      default: "Python"
    complexity_requirements:
      type: string
      description: "时间/空间复杂度要求"
      default: "无特殊要求"
    test_cases:
      type: array
      items:
        type: object
      description: "测试用例列表"
  required:
    - problem_description

defaults:
  timeout_s: 600
  retry: 3

output_schema:
  type: object
  properties:
    algorithm_name:
      type: string
      description: "算法名称"
    approach:
      type: string
      description: "算法设计思路"
    complexity:
      type: object
      properties:
        time:
          type: string
          description: "时间复杂度"
        space:
          type: string
          description: "空间复杂度"
    correctness_proof:
      type: string
      description: "正确性证明要点"
    code:
      type: string
      description: "算法实现代码"
    test_results:
      type: array
      items:
        type: object
      description: "测试结果"
  required:
    - algorithm_name
    - approach
    - complexity
    - code

prompt_template: |
  # 目标：{global.goal}

  ## 问题描述

  {params.problem_description}

  ## 实现语言

  {params.language}

  ## 复杂度要求

  {params.complexity_requirements}

  ---

  ## 上游输入

  来自 [{upstream_node_label}] 的输出：

  {upstream_output}

  ## 约束条件

  {global.constraints}

  ---

  ## 任务要求

  请完成以下工作：

  1. **算法设计**：描述你的算法设计思路，包括核心数据结构和算法策略
  2. **复杂度分析**：分析时间复杂度和空间复杂度，给出详细推导过程
  3. **正确性证明**：证明算法的正确性（归纳法、不变式等）
  4. **代码实现**：用 {params.language} 实现该算法，包含完整的函数签名和类型注解
  5. **测试验证**：使用提供的测试用例验证实现正确性

  ## 输出格式要求

  {output_schema}

  ---

  ## 超时与重试

  超时：{timeout_s} 秒  |  最大重试：{retry} 次
