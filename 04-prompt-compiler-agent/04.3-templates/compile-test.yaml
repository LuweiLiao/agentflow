# =============================================================================
# 模板：compile-test
# 用途：编译-测试迭代工作流
# 版本：1.0.0
# =============================================================================
name: "compile-test"
version: "1.0.0"
description: >
  编译-测试迭代工作流模板。
  适用于代码修改后触发编译、静态分析、单元测试、集成测试的自动化链路。
  支持编译错误修复的迭代闭环。

engine:
  runtime: "claude-code"
  model_recommendation: "claude-sonnet-4"

params_schema:
  type: object
  properties:
    source_path:
      type: string
      description: "源代码路径"
    language:
      type: string
      description: "编程语言"
    build_command:
      type: string
      description: "构建命令"
      default: "make"
    test_command:
      type: string
      description: "测试命令"
      default: "make test"
    static_analysis_tool:
      type: string
      description: "静态分析工具"
      default: "无"
    coverage_threshold:
      type: number
      description: "测试覆盖率阈值（百分比）"
      default: 80
    max_iterations:
      type: integer
      description: "最大修复迭代次数"
      default: 5
  required:
    - source_path
    - language
    - build_command
    - test_command

defaults:
  timeout_s: 1200
  retry: 2

output_schema:
  type: object
  properties:
    compilation_status:
      type: string
      enum:
        - "success"
        - "failed"
        - "partial"
      description: "编译状态"
    compilation_errors:
      type: array
      items:
        type: object
        properties:
          file:
            type: string
          line:
            type: integer
          column:
            type: integer
          message:
            type: string
          severity:
            type: string
            enum:
              - "error"
              - "warning"
              - "info"
      description: "编译错误列表"
    static_analysis_results:
      type: array
      items:
        type: object
        properties:
          file:
            type: string
          line:
            type: integer
          rule:
            type: string
          message:
            type: string
          severity:
            type: string
      description: "静态分析结果"
    test_results:
      type: object
      properties:
        total:
          type: integer
        passed:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
        coverage:
          type: number
          description: "覆盖率百分比"
        failures:
          type: array
          items:
            type: object
            properties:
              test_name:
                type: string
              message:
                type: string
              traceback:
                type: string
      description: "测试结果详情"
    fix_suggestions:
      type: array
      items:
        type: object
        properties:
          file:
            type: string
          line:
            type: integer
          issue:
            type: string
          suggestion:
            type: string
          patch:
            type: string
      description: "修复建议"
    iteration_count:
      type: integer
      description: "实际迭代次数"
  required:
    - compilation_status
    - test_results
    - iteration_count

prompt_template: |
  # 目标：{global.goal}

  ## 项目信息

  - 源码路径：{params.source_path}
  - 语言：{params.language}
  - 构建命令：{params.build_command}
  - 测试命令：{params.test_command}
  - 静态分析工具：{params.static_analysis_tool}
  - 覆盖率阈值：{params.coverage_threshold}%
  - 最大迭代次数：{params.max_iterations}

  ---

  ## 上游输入

  来自 [{upstream_node_label}] 的输出：

  {upstream_output}

  ## 约束条件

  {global.constraints}

  ---

  ## 任务要求

  请严格执行以下编译-测试迭代流程：

  ### 步骤 1：代码审查与准备
  - 读取 {params.source_path} 下的所有源文件
  - 理解代码结构和依赖关系
  - 识别需要关注的模块

  ### 步骤 2：编译构建
  - 执行 `{params.build_command}`
  - 捕获并解析编译输出
  - 记录所有编译错误和警告
  - 错误分类：file, line, column, message, severity

  ### 步骤 3：静态分析（如配置）
  - 若 {params.static_analysis_tool} != "无"，则运行该工具
  - 解析分析报告
  - 标记违反规则的代码位置

  ### 步骤 4：测试执行
  - 执行 `{params.test_command}`
  - 收集测试结果（通过/失败/跳过）
  - 收集覆盖率数据
  - 记录失败的测试用例及错误信息

  ### 步骤 5：错误修复（迭代）
  - 若编译失败或测试覆盖率 < {params.coverage_threshold}%：
    - 分析根因
    - 对每个错误生成修复建议
    - 提供具体的 patch（修改的文件、行号、修改内容）
  - 重复步骤 2-4 直到：
    - 编译成功且测试通过且覆盖率达标；或
    - 达到 {params.max_iterations} 次迭代上限

  ### 步骤 6：总结报告
  - 汇总迭代过程
  - 列出未解决的问题及其影响

  ## 输出格式要求

  {output_schema}

  ---

  ## 超时与重试

  超时：{timeout_s} 秒  |  最大重试：{retry} 次
