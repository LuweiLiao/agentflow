# =============================================================================
# 模板：software-dev
# 用途：软件开发全流程工作流
# 版本：1.1.0
# =============================================================================
name: "software-dev"
version: "1.1.0"
description: >
  软件开发全流程工作流模板。
  覆盖需求分析、架构设计、编码实现、代码审查、测试验证等环节。
  适用于中到大型软件项目的端到端开发。

engine:
  runtime: "claude-code"
  model_recommendation: "claude-sonnet-4"

params_schema:
  type: object
  properties:
    feature_description:
      type: string
      description: "功能需求描述"
    language:
      type: string
      description: "编程语言"
      default: "Python"
    framework:
      type: string
      description: "框架/库"
      default: "无"
    architecture_style:
      type: string
      description: "架构风格（微服务、单体、事件驱动等）"
      default: "单体"
    testing_framework:
      type: string
      description: "测试框架"
      default: "pytest"
    coding_standards:
      type: string
      description: "编码规范（PEP8、Google Style 等）"
      default: "遵循社区最佳实践"
  required:
    - feature_description

defaults:
  timeout_s: 900
  retry: 2

output_schema:
  type: object
  properties:
    requirements:
      type: array
      items:
        type: string
      description: "需求列表"
    architecture:
      type: object
      description: "架构设计"
    implementation:
      type: object
      properties:
        files:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              content:
                type: string
          description: "文件列表"
        entry_point:
          type: string
          description: "入口文件路径"
    tests:
      type: array
      items:
        type: object
      description: "测试用例"
    review_comments:
      type: array
      items:
        type: string
      description: "代码审查意见"
  required:
    - requirements
    - architecture
    - implementation
    - tests

prompt_template: |
  # 目标：{global.goal}

  ## 功能描述

  {params.feature_description}

  ## 技术栈

  - 语言：{params.language}
  - 框架/库：{params.framework}
  - 架构风格：{params.architecture_style}
  - 测试框架：{params.testing_framework}
  - 编码规范：{params.coding_standards}

  ---

  ## 上游输入

  来自 [{upstream_node_label}] 的输出：

  {upstream_output}

  ## 约束条件

  {global.constraints}

  ---

  ## 任务要求

  请严格按照以下流程执行：

  ### 阶段 1：需求分析
  - 拆解功能描述为具体的、可验证的需求项
  - 明确输入/输出边界
  - 识别潜在边缘情况

  ### 阶段 2：架构设计
  - 设计模块划分和接口定义
  - 描述数据流和控制流
  - 提供架构图（文本描述）
  - 说明关键设计决策及理由

  ### 阶段 3：编码实现
  - 遵循 {params.coding_standards} 编码规范
  - 包含完整的错误处理
  - 添加必要的注释和文档字符串
  - 输出文件列表及完整代码

  ### 阶段 4：代码审查
  - 自我审查代码质量
  - 检查潜在的安全漏洞和性能问题
  - 提出改进建议

  ### 阶段 5：测试验证
  - 编写单元测试覆盖核心逻辑
  - 包含边界条件测试
  - 测试覆盖率 > 80%

  ## 输出格式要求

  {output_schema}

  ---

  ## 超时与重试

  超时：{timeout_s} 秒  |  最大重试：{retry} 次
